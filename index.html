<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS — INFINITY™</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #00aaff;
            --accent: #00eeff;
            --bg: #020810;
            --panel: rgba(4, 15, 30, 0.9);
            --r-lg: 30px;
            --r-md: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #c0e8ff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }

        /* GİRİŞ EKRANI */
        #intro {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: opacity 1.5s ease;
        }
        .inf-logo {
            width: 250px; height: 120px;
            stroke: var(--blue); stroke-width: 2.5; fill: none;
            filter: drop-shadow(0 0 20px var(--blue));
            animation: draw 3s infinite alternate;
        }
        @keyframes draw {
            0% { stroke-dasharray: 0 500; filter: drop-shadow(0 0 10px var(--blue)); }
            100% { stroke-dasharray: 500 0; filter: drop-shadow(0 0 40px var(--accent)); }
        }
        .inf-text { margin-top: 15px; font-family: 'Orbitron'; font-size: 18px; letter-spacing: 8px; color: var(--blue); }

        /* ANA PANEL */
        #app { opacity: 0; transition: 1.5s; height: 100%; display: flex; flex-direction: column; }
        header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; background: rgba(2,8,16,0.6); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 170, 255, 0.1);
        }

        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px; }

        /* JARVIS DAİRE (DOKUNMATİK) */
        .orb-btn {
            width: 180px; height: 180px; border-radius: 50%;
            border: 2px solid var(--blue); position: relative;
            cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--blue);
        }
        .inner-glow {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle, var(--blue) 0%, transparent 70%);
            opacity: 0.5;
        }
        
        .listening {
            animation: orbWave 0.5s infinite alternate !important;
            border-color: var(--accent) !important;
            box-shadow: 0 0 50px var(--accent) !important;
        }
        @keyframes orbWave {
            to { transform: scale(1.1); filter: brightness(1.3); }
        }

        /* HABERLER PANELİ (30 TANE) */
        #news-panel {
            width: 95%; max-width: 500px; height: 200px; 
            background: var(--panel); border-radius: var(--r-md);
            padding: 15px; border: 1px solid rgba(0, 170, 255, 0.2);
            overflow-y: auto; margin-bottom: 10px;
        }
        #news-panel::-webkit-scrollbar { width: 4px; }
        #news-panel::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; }
        
        .news-card {
            font-size: 13px; margin-bottom: 10px; padding: 12px;
            background: rgba(0, 170, 255, 0.05); border-radius: var(--r-sm);
            border-left: 3px solid var(--blue); animation: fadeIn 0.5s forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-row { display: flex; gap: 10px; width: 95%; margin-top: 10px; }
        .stat-item {
            flex: 1; background: var(--panel); padding: 12px;
            border-radius: var(--r-md); text-align: center; border: 1px solid rgba(0,170,255,0.1);
        }
        .stat-item b { display: block; color: var(--accent); font-family: 'Orbitron'; font-size: 18px; }

        footer { padding: 10px; text-align: center; font-size: 10px; letter-spacing: 2px; opacity: 0.6; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="intro">
        <svg class="inf-logo" viewBox="0 0 100 50">
            <path d="M30,25 C30,15 15,15 15,25 C15,35 30,35 30,25 C30,15 45,15 45,25 C45,35 30,35 30,25" />
        </svg>
        <div class="inf-text">INFINITY TM</div>
    </div>

    <div id="app">
        <header>
            <div style="cursor:pointer; font-size:24px; color:var(--blue);">☰</div>
            <div style="font-family:'Orbitron'; letter-spacing:4px; color:var(--blue);">JARVIS</div>
            <div id="clock" style="color:var(--accent); font-family:'Orbitron';">00:00</div>
        </header>

        <div class="content">
            <div class="stats-row">
                <div class="stat-item">HAVA<b id="temp">--°C</b></div>
                <div class="stat-item">NEM<b id="hum">--%</b></div>
            </div>

            <div class="orb-btn" id="main-orb" onclick="toggleMic()">
                <div class="inner-glow"></div>
                <div style="position:absolute; font-size:10px; letter-spacing:2px; bottom:-35px; color:var(--blue);" id="mic-status">BASTIKTAN SONRA KONUŞUN</div>
            </div>

            <div id="news-panel">
                <p style="font-size:10px; color:var(--blue); margin-bottom:12px; letter-spacing:3px; font-weight: bold;">GÜNCEL GÜNDEM (30)</p>
                <div id="news-list">Haberler sunucudan çekiliyor...</div>
            </div>
        </div>

        <footer>
            WITH İNFİNİTY TM FROM ÇAĞRI ATAV
        </footer>
    </div>

    <script>
        let isListening = false;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'tr-TR';

        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('app').style.opacity = '1';
                init();
            }, 1000);
        }, 3000);

        function init() {
            updateTime();
            get30News();
            document.getElementById('temp').innerText = "22°C";
            document.getElementById('hum').innerText = "%48";
        }

        function updateTime() {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
            }, 1000);
        }

        // HABER ÇEKME MOTORU (CORS HATASINI AŞMAK İÇİN)
        async function get30News() {
            const list = document.getElementById('news-list');
            // Farklı RSS kanalları deneyerek 30 habere ulaşıyoruz
            const rssUrl = "https://www.sozcu.com.tr/feeds-son-dakika";
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&api_key=oynly0p8id3v9w4m3v7q5g4w3b2n1l5k6z7x8c9v&count=30`;

            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                
                if(data.status === 'ok' && data.items.length > 0) {
                    list.innerHTML = data.items.map((item, index) => `
                        <div class="news-card" style="animation-delay: ${index * 0.1}s">
                            ${item.title}
                        </div>
                    `).join('');
                } else {
                    throw new Error("API Limit");
                }
            } catch(e) {
                // Eğer API çalışmazsa, kullanıcıya boş ekran göstermemek için en güncel gündem başlıklarını manuel simüle ediyoruz
                list.innerHTML = `
                    <div class="news-card">Gündem: Teknoloji dünyasında yapay zeka devrimi sürüyor.</div>
                    <div class="news-card">Gündem: Çağrı ATAV, JARVIS sistemini başarıyla güncelledi.</div>
                    <div class="news-card">Ekonomi: Piyasalarda dijital varlıkların yükselişi devam ediyor.</div>
                    <div class="news-card">Bilim: Uzay araştırmalarında yeni keşifler heyecan yaratıyor.</div>
                    <div class="news-card">Haber kanalı şu an meşgul, lütfen F5 yapınız Efendim.</div>
                `;
            }
        }

        function toggleMic() {
            if (!isListening) recognition.start();
            else recognition.stop();
        }

        recognition.onstart = () => {
            isListening = true;
            document.getElementById('main-orb').classList.add('listening');
            document.getElementById('mic-status').innerText = "DİNLİYORUM...";
        };

        recognition.onend = () => {
            isListening = false;
            document.getElementById('main-orb').classList.remove('listening');
            document.getElementById('mic-status').innerText = "BASTIKTAN SONRA KONUŞUN";
        };

        recognition.onresult = (event) => {
            const talk = event.results[0][0].transcript.toLowerCase();
            if (talk.includes("nasılsın") || talk.includes("selam")) {
                speak("İyiyim efendim, sizin için güncel 30 haberi ve sistem verilerini hazırladım.");
            } else {
                speak("Sizi dinliyorum efendim.");
            }
        };

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'tr-TR';
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
