<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS — INFINITY™</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --main:#00aaff; --bg:#020810; --panel:rgba(4,15,30,0.98); --text:#c0e8ff; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; overflow:hidden; height:100vh; width:100vw; touch-action:none; transition:background 1s, color 1s; }

        body.white-theme { background:#ffffff !important; color:#000000 !important; }
        body.white-theme .draggable, body.white-theme #news-panel, body.white-theme .switch-wrap, body.white-theme #drawer { background: rgba(240,240,240,0.95); border: 1px solid #333; color: #000; }

        /* Giriş Ekranı */
        #intro { position:fixed; inset:0; z-index:9999; background:#000; display:flex; align-items:center; justify-content:center; transition:opacity 0.8s; pointer-events: none; }
        .inf-logo { width:150px; stroke:var(--main); stroke-width:2.5; fill:none; animation:draw 3s infinite alternate; }
        @keyframes draw { 0%{stroke-dasharray:0 500;} 100%{stroke-dasharray:500 0; filter:drop-shadow(0 0 30px var(--main));} }

        #app { opacity:0; height:100%; display:flex; flex-direction:column; transition:opacity 1s; visibility: hidden; }
        header { padding:12px 20px; display:flex; justify-content:space-between; align-items:center; background:rgba(2,8,16,0.8); border-bottom:1px solid rgba(255,255,255,0.05); }

        /* Yan Menü (Drawer) */
        #drawer { position:fixed; top:0; left:-320px; width:280px; height:100%; background:var(--panel); z-index:2000; padding:40px 20px; border-right:1px solid var(--main); box-shadow:10px 0 30px #000; transition:left 0.5s; display:flex; flex-direction:column; }
        .drawer-open { left:0!important; }
        .menu-item { padding:15px; margin-bottom:12px; border-radius:15px; background:rgba(255,255,255,0.03); cursor:pointer; display:flex; align-items:center; justify-content:space-between; font-family:'Orbitron'; font-size:12px; }
        select { background:#000; color:var(--main); border:1px solid var(--main); border-radius:10px; padding:3px; outline:none; font-family:'Rajdhani'; }

        /* Paneller */
        .draggable { position:absolute; width:90%; max-width:350px; background:var(--panel); border:1px solid var(--main); border-radius:15px; padding:15px; z-index:500; backdrop-filter:blur(10px); display:none; cursor:move; }
        .panel-header { display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px; margin-bottom:10px; font-size:12px; font-family:'Orbitron'; pointer-events:none; }
        .close-btn { cursor:pointer; color:var(--main); pointer-events:auto; font-weight:bold; }

        .main-content { flex:1; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; }

        #mic-btn {
            width:150px; height:150px; border-radius:50%;
            border:3px solid var(--main);
            background:radial-gradient(circle, rgba(0,170,255,0.1), transparent 80%);
            box-shadow:0 0 20px var(--main);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; position:relative; z-index:10; outline:none; transition: 0.3s;
        }
        #mic-btn.listening { box-shadow:0 0 50px var(--main), inset 0 0 20px var(--main); animation:pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }

        #news-panel { width:92%; height:180px; background:var(--panel); border-radius:20px; padding:15px; overflow-y:auto; border:1px solid var(--main); margin-top:20px; }
        .news-card { font-size:13px; margin-bottom:8px; padding:10px; background:rgba(255,255,255,0.02); border-radius:10px; border-left:3px solid var(--main); }

        /* Kontroller */
        .controls { position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:10px; z-index:1000; }
        .switch-wrap { display:flex; align-items:center; justify-content:space-between; gap:15px; background:var(--panel); padding:8px 15px; border-radius:20px; border:1px solid var(--main); min-width:160px; font-size:11px; font-family:'Orbitron'; }
        
        .switch { position:relative; width:34px; height:20px; }
        .switch input { opacity:0; width:0; height:0; }
        .slider { position:absolute; cursor:pointer; inset:0; background:#222; border-radius:34px; transition:.4s; }
        .slider:before { position:absolute; content:""; height:14px; width:14px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.4s; }
        input:checked + .slider { background:var(--main); }
        input:checked + .slider:before { transform:translateX(14px); }

        #chat-input { width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--main); color:white; padding:10px; border-radius:10px; outline:none; font-family:'Rajdhani'; }
        #bat-display { font-size:11px; color:var(--main); font-family:'Orbitron'; }
    </style>
</head>
<body>
    <div id="intro"><svg class="inf-logo" viewBox="0 0 100 50"><path d="M30,25 C30,15 15,15 15,25 C15,35 30,35 30,25 C30,15 45,15 45,25 C45,35 30,35 30,25"/></svg></div>

    <div id="drawer">
        <div style="font-family:'Orbitron';color:var(--main);margin-bottom:20px;border-bottom:1px solid var(--main);padding-bottom:10px;">AYARLAR</div>
        <div class="menu-item">
            <span>SES TONU</span>
            <select id="voice-gender">
                <option value="erkek">Erkek</option>
                <option value="kadin">Kadın</option>
            </select>
        </div>
        <div class="menu-item" onclick="location.reload()">
            <span>SİSTEMİ YENİLE</span>
            <span>🔄</span>
        </div>
        <div style="margin-top:auto; text-align:center;">
            <p style="font-size:10px; opacity:0.5; margin-bottom:5px;">BY ÇAĞRI ATAV</p>
            <p style="font-family:'Orbitron'; color:var(--main); letter-spacing:3px; font-weight:bold;">INFINITY™</p>
        </div>
    </div>

    <div id="app">
        <header>
            <div onclick="document.getElementById('drawer').classList.toggle('drawer-open')" style="cursor:pointer;font-size:24px;color:var(--main);">☰</div>
            <div style="font-family:'Orbitron';color:var(--main);letter-spacing:2px;font-weight:bold;">JARVIS</div>
            <div id="bat-display">🔋 —%</div>
        </header>

        <div class="main-content">
            <div id="word-panel" class="draggable" style="top:80px; left:20px;">
                <div class="panel-header"><span>SÖZCÜK</span><span class="close-btn" onclick="closeBox('word-panel')">✖</span></div>
                <p id="transcript-text" style="font-size:14px;">Sesiniz burada görünecek...</p>
            </div>

            <div id="text-panel" class="draggable" style="top:220px; left:20px;">
                <div class="panel-header"><span>METİN</span><span class="close-btn" onclick="closeBox('text-panel')">✖</span></div>
                <input type="text" id="chat-input" placeholder="Emredin..." onkeypress="handleChat(event)">
            </div>
            
            <button id="mic-btn" onclick="toggleMic()">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                    <rect x="9" y="2" width="6" height="11" rx="3" />
                    <path d="M5 11c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke="white" stroke-width="2" fill="none" />
                </svg>
            </button>

            <div id="news-panel"><div id="news-list"></div></div>
        </div>

        <div class="controls">
            <div class="switch-wrap"><span>METİN</span><label class="switch"><input type="checkbox" id="text-switch" onchange="syncBox('text-panel', this)"><span class="slider"></span></label></div>
            <div class="switch-wrap"><span>SÖZCÜK</span><label class="switch"><input type="checkbox" id="word-switch" onchange="syncBox('word-panel', this)"><span class="slider"></span></label></div>
        </div>
    </div>

<script>
var isListening = false;
var allNews = [
    "Ekonomi: Dijital varlıklar rekor seviyeye ulaştı.",
    "Teknoloji: Kuantum bilgisayarlar şifrelemeyi değiştiriyor.",
    "Gündem: Füzyon reaktörleri başarıyla test edildi.",
    "Uzay: Mars kolonisinde ilk habitat kuruldu.",
    "Sağlık: Nanobot tedavisi kanser hücrelerini yok ediyor.",
    "Havacılık: Yerli uçak projeleri dünya pazarında.",
    "Otomotiv: Otonom sürüş sistemleri standart oldu.",
    "Çevre: Okyanus temizleme filtreleri devreye girdi.",
    "Eğitim: Hologram öğretmenler derslere başladı.",
    "Spor: Robotik atletizm oyunları rekor kırdı."
];

var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
var rec = null;
var synth = window.speechSynthesis;

function finishIntro() {
    const intro = document.getElementById('intro');
    const app = document.getElementById('app');
    if(intro) {
        intro.style.opacity = '0';
        setTimeout(() => {
            intro.style.display = 'none';
            app.style.visibility = 'visible';
            app.style.opacity = '1';
            updateBattery();
            const shuffled = allNews.sort(() => 0.5 - Math.random());
            document.getElementById('news-list').innerHTML = shuffled.slice(0, 5).map(n => `<div class="news-card">${n}</div>`).join('');
            makeDraggable(document.getElementById('word-panel'));
            makeDraggable(document.getElementById('text-panel'));
        }, 800);
    }
}

function toggleMic() {
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    if (!SpeechRec) return;
    if (isListening) { rec.stop(); return; }
    rec = new SpeechRec();
    rec.lang = 'tr-TR';
    rec.onstart = () => { 
        isListening = true; 
        document.getElementById('mic-btn').classList.add('listening');
        document.getElementById('word-switch').checked = true;
        document.getElementById('word-panel').style.display = 'block';
    };
    rec.onend = () => { isListening = false; document.getElementById('mic-btn').classList.remove('listening'); };
    rec.onresult = (e) => {
        const cmd = e.results[0][0].transcript.toLowerCase();
        document.getElementById('transcript-text').innerText = cmd;
        processCommand(cmd);
    };
    rec.start();
}

function handleChat(e) { if(e.key === 'Enter') { processCommand(e.target.value.toLowerCase()); e.target.value = ''; } }

function processCommand(cmd) {
    if(cmd.includes('haber')) {
        const shuffled = allNews.sort(() => 0.5 - Math.random());
        speak("Efendim, güncel veriler: " + shuffled.slice(0, 3).join('. '));
    }
    else if(cmd.includes('selam')) speak("Selam Efendim, By Çağrı Atav isimli tüm sürücüler aktif.");
    else if(cmd.includes('mat')) speak("Matematik modülü aktif Efendim.");
    else speak("Anlaşıldı Efendim: " + cmd);
}

function speak(t) {
    synth.cancel();
    var m = new SpeechSynthesisUtterance(t);
    m.lang = 'tr-TR';
    m.pitch = document.getElementById('voice-gender').value === 'erkek' ? 0.8 : 1.3;
    m.rate = 0.95;
    synth.speak(m);
}

function syncBox(id, el) { document.getElementById(id).style.display = el.checked ? 'block' : 'none'; }
function closeBox(id) { document.getElementById(id).style.display = 'none'; if(id==='text-panel') document.getElementById('text-switch').checked = false; else document.getElementById('word-switch').checked = false; }

async function updateBattery(){
    if(navigator.getBattery){
        const b = await navigator.getBattery();
        const u = () => {
            let l = Math.round(b.level * 100);
            document.getElementById('bat-display').innerText = '🔋 ' + l + '%';
            if(l <= 10) document.body.classList.add('white-theme');
            else {
                document.body.classList.remove('white-theme');
                let color = l >= 50 ? '#00aaff' : (l >= 20 ? '#00ff88' : '#ff4444');
                document.documentElement.style.setProperty('--main', color);
            }
        };
        u(); b.addEventListener('levelchange', u);
    }
}

function makeDraggable(el) {
    var sx = 0, sy = 0, on = false;
    el.addEventListener('mousedown', (e) => { if(e.target.classList.contains('close-btn') || e.target.id === 'chat-input') return; on = true; sx = e.clientX - el.offsetLeft; sy = e.clientY - el.offsetTop; });
    el.addEventListener('touchstart', (e) => { if(e.target.classList.contains('close-btn') || e.target.id === 'chat-input') return; on = true; sx = e.touches[0].clientX - el.offsetLeft; sy = e.touches[0].clientY - el.offsetTop; }, {passive:true});
    document.addEventListener('mousemove', (e) => { if(!on) return; el.style.left = (e.clientX - sx) + 'px'; el.style.top = (e.clientY - sy) + 'px'; });
    document.addEventListener('touchmove', (e) => { if(!on) return; el.style.left = (e.touches[0].clientX - sx) + 'px'; el.style.top = (e.touches[0].clientY - sy) + 'px'; }, {passive:false});
    document.addEventListener('mouseup', () => on = false);
    document.addEventListener('touchend', () => on = false);
}

setTimeout(finishIntro, 2000);
</script>
</body>
</html>
