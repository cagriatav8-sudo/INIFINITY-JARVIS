<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS — INFINITY™ BATTERY FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main: #00aaff; 
            --accent: #00eeff; 
            --bg: #020810; 
            --panel: rgba(4, 15, 30, 0.98); 
        }

        /* Renk bürünme efekti için 2 saniyelik yumuşak geçiş */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            transition: color 2s ease, border-color 2s ease, box-shadow 2s ease, background 2s ease, stroke 2s ease;
        }

        body { 
            background: var(--bg); color: #c0e8ff; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw; 
            touch-action: none; 
        }

        #intro { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; transition: 1s; }
        .inf-logo { width: 150px; stroke: var(--main); stroke-width: 2.5; fill: none; animation: draw 3s infinite alternate; }
        @keyframes draw { 0% { stroke-dasharray: 0 500; } 100% { stroke-dasharray: 500 0; filter: drop-shadow(0 0 30px var(--main)); } }

        #app { opacity: 0; height: 100%; display: flex; flex-direction: column; transition: 1.5s; }
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(2,8,16,0.8); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; }

        #drawer { position: fixed; top: 0; left: -320px; width: 280px; height: 100%; background: var(--panel); z-index: 2000; padding: 40px 20px; border-right: 1px solid var(--main); box-shadow: 10px 0 30px #000; transition: 0.5s ease; }
        .drawer-open { left: 0 !important; }
        .menu-item { padding: 15px; margin-bottom: 12px; border-radius: 15px; background: rgba(255,255,255,0.03); cursor: pointer; display: flex; align-items: center; justify-content: space-between; }

        .draggable { position: absolute; width: 92%; max-width: 380px; background: var(--panel); border: 1px solid var(--main); border-radius: 20px; padding: 20px; z-index: 500; backdrop-filter: blur(25px); box-shadow: 0 0 40px rgba(0,0,0,0.8); cursor: move; display: none; }
        .panel-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; pointer-events: none; }
        .close-btn { pointer-events: auto; cursor: pointer; color: var(--main); font-size: 20px; }

        .main-content { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .orb-btn { width: 140px; height: 140px; border-radius: 50%; border: 2px solid var(--main); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--main); cursor: pointer; z-index: 10; position: relative; }
        .listening { box-shadow: 0 0 50px var(--main), inset 0 0 20px var(--main); }

        #news-panel { width: 92%; height: 220px; background: var(--panel); border-radius: 22px; padding: 18px; overflow-y: auto; border: 1px solid var(--main); margin-top: 20px; }
        .news-card { font-size: 13px; margin-bottom: 10px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; border-left: 4px solid var(--main); line-height: 1.4; }

        .controls { position: fixed; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; }
        .switch-wrap { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--panel); padding: 10px 15px; border-radius: 20px; border: 1px solid var(--main); min-width: 155px; font-size: 10px; }
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #222; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--main); }
        input:checked + .slider:before { transform: translateX(16px); }

        select { background: #000; color: var(--main); border: 1px solid var(--main); border-radius: 10px; padding: 3px; outline: none; }
        #chat-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--main); color: white; padding: 12px; border-radius: 12px; outline: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="intro"><svg class="inf-logo" viewBox="0 0 100 50"><path d="M30,25 C30,15 15,15 15,25 C15,35 30,35 30,25 C30,15 45,15 45,25 C45,35 30,35 30,25" /></svg></div>
    
    <div id="drawer">
        <div style="font-family:'Orbitron'; color:var(--main); margin-bottom:20px;">SİSTEM PANELİ</div>
        <div class="menu-item"><span>SES TONU</span><select id="voice-gender"><option value="erkek">Erkek</option><option value="kadin">Kadın</option></select></div>
        <div class="menu-item" onclick="location.reload()">🔄 Yenile</div>
        <div style="margin-top:auto; font-weight:bold; color:var(--main); text-align:center;">BY ÇAĞRI ATAV</div>
    </div>

    <div id="app">
        <header>
            <div onclick="document.getElementById('drawer').classList.toggle('drawer-open')" style="cursor:pointer; font-size:26px; color:var(--main);">☰</div>
            <div style="font-family:'Orbitron'; color:var(--main); letter-spacing:2px; font-weight:bold;">JARVIS REAL-TIME</div>
            <div id="clock">00:00</div>
        </header>
        
        <div class="main-content">
            <div id="transcript-area" class="draggable" style="top: 80px; left: 10px;">
                <div class="panel-header"><span>ALTYAZI</span><span class="close-btn" onclick="closeBox('transcript-area')">✖</span></div>
                <p id="transcript-text">Gündem verileri analiz edildi Efendim.</p>
            </div>
            
            <div id="input-area" class="draggable" style="top: 240px; left: 10px;">
                <div class="panel-header"><span>KLAVYE</span><span class="close-btn" onclick="closeBox('input-area')">✖</span></div>
                <input type="text" id="chat-input" placeholder="Emredin..." onkeypress="handleChat(event)">
            </div>
            
            <div class="orb-btn" id="main-orb" onclick="toggleMic()">
                <div style="width:90px; height:90px; border-radius:50%; background:radial-gradient(circle, var(--main), transparent 85%); opacity:0.6; pointer-events:none;"></div>
            </div>
            
            <div id="news-panel"><div id="news-list"></div></div>
        </div>

        <div class="controls">
            <div class="switch-wrap"><span>METİN PANELİ</span><label class="switch"><input type="checkbox" id="panel-switch" onchange="syncPanels()"><span class="slider"></span></label></div>
            <div class="switch-wrap"><span>SESLİ YANIT</span><label class="switch"><input type="checkbox" id="voice-switch" checked><span class="slider"></span></label></div>
        </div>
    </div>

    <script>
        let isListening = false; 
        let newsDatabase = [
            "Ekonomi: Merkez Bankası faiz kararını açıkladı, piyasalar dengeye oturdu.",
            "Spor: Süper Lig'de zirve mücadelesi heyecanı devam ediyor, puanlar çok yakın.",
            "Teknoloji: Yerli yapay zeka projeleri dünya genelinde ses getirmeye başladı.",
            "Dünya: Küresel iklim zirvesinde yeni çevre koruma kararları alındı.",
            "Uzay: NASA'nın yeni ay görevi için hazırlanan roket fırlatma rampasına getirildi.",
            "Havacılık: Türkiye'nin insansız savaş uçağı prototipi yeni testlerden başarıyla geçti.",
            "Sağlık: Yeni geliştirilen yöntemle iğnesiz kan tahlili artık mümkün.",
            "Otomobil: Elektrikli araçlarda batarya ömrünü iki katına çıkaran yeni teknoloji tanıtıldı.",
            "Sanat: Ünlü ressamın daha önce görülmemiş bir tablosu keşfedildi.",
            "Eğitim: Okullarda kodlama ve robotik eğitimleri için müfredat güncellendi."
        ]; 
        let newsIndex = 0; 
        let batLevel = 100;

        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = SpeechRec ? new SpeechRec() : null; 
        if(rec) { rec.lang = 'tr-TR'; rec.continuous = false; }

        setTimeout(() => { 
            document.getElementById('intro').style.opacity = '0'; 
            setTimeout(() => { 
                document.getElementById('intro').style.display='none'; 
                document.getElementById('app').style.opacity='1'; 
                init(); 
            }, 1000); 
        }, 2000);

        function init() {
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}), 1000);
            updateBattery();
            document.getElementById('news-list').innerHTML = newsDatabase.map(n => `<div class="news-card">${n}</div>`).join('');
            makeDraggable(document.getElementById("transcript-area"));
            makeDraggable(document.getElementById("input-area"));
        }

        async function updateBattery() {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                const up = () => {
                    batLevel = Math.round(b.level * 100);
                    applyTheme(batLevel);
                };
                up(); b.onlevelchange = up;
            } else {
                // Tarayıcı desteklemiyorsa tema test amaçlı olarak şarjı %45 gibi gösterip rengi yeşil yapalım
                applyTheme(45); 
            }
        }

        function applyTheme(level) {
            const root = document.documentElement;
            // Şarj göstergesini de güncelleyelim (varsa bir yerlerde göstermek istersen)
            if(level <= 20) {
                root.style.setProperty('--main', '#ff4444'); // KIRMIZI
            } else if(level <= 50) {
                root.style.setProperty('--main', '#00ff88'); // YEŞİL
            } else {
                root.style.setProperty('--main', '#00aaff'); // MAVİ
            }
        }

        function toggleMic() {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            if(!isListening && rec) { try { rec.start(); } catch(e) {} } else if(rec) { try { rec.stop(); } catch(e) {} }
        }

        if(rec) {
            rec.onstart = () => { isListening=true; document.getElementById('main-orb').classList.add('listening'); };
            rec.onend = () => { isListening=false; document.getElementById('main-orb').classList.remove('listening'); };
            rec.onresult = (e) => processJarvis(e.results[e.results.length-1][0].transcript.toLowerCase());
        }

        function handleChat(e) { if(e.key === 'Enter') { processCommand(e.target.value.toLowerCase()); e.target.value=''; } }

        function processJarvis(msg) {
            processCommand(msg);
        }

        function processCommand(msg) {
            let res = "";
            if (msg.includes("haberi oku") || msg.includes("haberleri oku") || msg.includes("bugün ne oldu") || msg.includes("haberler")) {
                newsIndex = 0; 
                let batch = newsDatabase.slice(0, 5);
                res = "Efendim, bugünün özeti şöyledir: " + batch.join(". ") + ". Devam etmemi ister misiniz?";
                newsIndex = 5;
            } else if (msg.includes("devam et") || msg.includes("devam")) {
                let batch = newsDatabase.slice(newsIndex, newsIndex + 5);
                res = batch.length > 0 ? "Haberlere devam ediyorum: " + batch.join(". ") : "Tüm güncel haberler bitti Efendim.";
                newsIndex += 5;
            } else if (msg.includes("selam") || msg.includes("nasılsın")) {
                res = `İyiyim Efendim. By Çağrı ATAV imzalı sistemler stabil. Haberleri okumamı ister misiniz?`;
            } else { 
                res = "Sizi dinliyorum Efendim."; 
            }
            speak(res);
        }

        function speak(t) {
            document.getElementById('transcript-area').style.display = 'block';
            document.getElementById('panel-switch').checked = true;
            document.getElementById('transcript-text').innerText = t;
            if(document.getElementById('voice-switch').checked) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(t); u.lang = 'tr-TR';
                const g = document.getElementById('voice-gender').value;
                u.pitch = (g === 'erkek') ? 0.8 : 1.3;
                window.speechSynthesis.speak(u);
            }
        }

        function closeBox(id) { document.getElementById(id).style.display = 'none'; }
        
        function syncPanels() {
            const c = document.getElementById('panel-switch').checked;
            document.getElementById('transcript-area').style.display = c ? 'block' : 'none';
            document.getElementById('input-area').style.display = c ? 'block' : 'none';
        }

        function makeDraggable(el) {
            let px = 0, py = 0, sx = 0, sy = 0;
            const h = el.querySelector('.panel-header') || el;
            h.onmousedown = s; h.ontouchstart = s;
            function s(e) {
                if(e.type === 'touchstart') { sx = e.touches[0].clientX; sy = e.touches[0].clientY; } else { sx = e.clientX; sy = e.clientY; }
                document.onmousemove = m; document.ontouchmove = m; document.onmouseup = end; document.ontouchend = end;
            }
            function m(e) {
                let cx, cy;
                if(e.type === 'touchmove') { cx = e.touches[0].clientX; cy = e.touches[0].clientY; } else { cx = e.clientX; cy = e.clientY; }
                px = sx - cx; py = sy - cy; sx = cx; sy = cy;
                el.style.top = (el.offsetTop - py) + "px"; el.style.left = (el.offsetLeft - px) + "px";
            }
            function end() { document.onmousemove = null; document.ontouchmove = null; }
        }
    </script>
</body>
</html>
