<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS — INFINITY™ INTELLIGENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00aaff; --accent: #00eeff; --bg: #020810; --panel: rgba(4, 15, 30, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; 
            transition: color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease; }
        body { background: var(--bg); color: #c0e8ff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }

        #intro { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; transition: 1s; }
        .inf-logo { width: 150px; stroke: var(--main); stroke-width: 2.5; fill: none; animation: draw 3s infinite alternate; }
        @keyframes draw { 0% { stroke-dasharray: 0 500; } 100% { stroke-dasharray: 500 0; filter: drop-shadow(0 0 30px var(--main)); } }

        #app { opacity: 0; height: 100%; display: flex; flex-direction: column; transition: 1.5s; }
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(2,8,16,0.8); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; }

        #drawer { position: fixed; top: 0; left: -320px; width: 280px; height: 100%; background: var(--panel); z-index: 2000; padding: 40px 20px; border-right: 1px solid var(--main); box-shadow: 10px 0 30px #000; transition: 0.5s ease; }
        .drawer-open { left: 0 !important; }
        .menu-item { padding: 15px; margin-bottom: 12px; border-radius: 15px; background: rgba(255,255,255,0.03); cursor: pointer; display: flex; align-items: center; justify-content: space-between; }

        .draggable { position: absolute; width: 92%; max-width: 380px; background: var(--panel); border: 1px solid var(--main); border-radius: 20px; padding: 20px; z-index: 500; backdrop-filter: blur(25px); box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .panel-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; font-weight: bold; color: var(--main); }
        .close-btn { cursor: pointer; font-size: 18px; }

        .main-content { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .orb-btn { width: 140px; height: 140px; border-radius: 50%; border: 2px solid var(--main); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--main); cursor: pointer; z-index: 10; position: relative; }
        .listening { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 20px var(--main); } 50% { box-shadow: 0 0 50px var(--main), inset 0 0 20px var(--main); } 100% { box-shadow: 0 0 20px var(--main); } }

        #news-panel { width: 92%; height: 200px; background: var(--panel); border-radius: 22px; padding: 18px; overflow-y: auto; border: 1px solid var(--main); margin-top: 20px; }
        .news-card { font-size: 13px; margin-bottom: 10px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; border-left: 4px solid var(--main); }

        .controls { position: fixed; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; }
        .switch-wrap { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--panel); padding: 10px 15px; border-radius: 20px; border: 1px solid var(--main); min-width: 160px; font-size: 12px; }
        
        /* Toggle Switch */
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #222; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--main); }
        input:checked + .slider:before { transform: translateX(20px); }

        #chat-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--main); color: white; padding: 12px; border-radius: 12px; outline: none; margin-top: 10px; font-family: 'Rajdhani'; }
    </style>
</head>
<body>
    <div id="intro"><svg class="inf-logo" viewBox="0 0 100 50"><path d="M30,25 C30,15 15,15 15,25 C15,35 30,35 30,25 C30,15 45,15 45,25 C45,35 30,35 30,25" /></svg></div>
    
    <div id="drawer">
        <div style="font-family:'Orbitron'; color:var(--main); margin-bottom:20px;">SİSTEM PANELİ</div>
        <div class="menu-item"><span>SES TONU</span><select id="voice-gender" style="background:black; color:cyan; border:1px solid cyan;"><option value="erkek">Erkek</option><option value="kadin">Kadın</option></select></div>
        <div class="menu-item" onclick="location.reload()">🔄 Sistemi Yenile</div>
        <div style="margin-top:auto; font-weight:bold; color:var(--main); text-align:center; padding-top:200px;">BY ÇAĞRI ATAV</div>
    </div>

    <div id="app">
        <header>
            <div onclick="document.getElementById('drawer').classList.toggle('drawer-open')" style="cursor:pointer; font-size:26px; color:var(--main);">☰</div>
            <div style="font-family:'Orbitron'; color:var(--main); letter-spacing:2px; font-weight:bold;">JARVIS REAL-TIME</div>
            <div id="clock">00:00:00</div>
        </header>
        
        <div class="main-content">
            <div id="transcript-area" class="draggable" style="top: 80px; display: block;">
                <div class="panel-header"><span>SÖZCÜK ALANI</span></div>
                <p id="transcript-text">Sistem çevrimiçi. Matematik ve Gündem modülü hazır, Efendim.</p>
            </div>
            
            <div id="input-area" class="draggable" style="top: 220px; display: block;">
                <div class="panel-header"><span>KLAVYE GİRİŞİ</span></div>
                <input type="text" id="chat-input" placeholder="Matematik (örn: 15x4) veya komut yazın..." onkeypress="handleChat(event)">
            </div>
            
            <div class="orb-btn" id="main-orb" onclick="toggleMic()">
                <div style="width:90px; height:90px; border-radius:50%; background:radial-gradient(circle, var(--main), transparent 85%); opacity:0.6;"></div>
            </div>
            
            <div id="news-panel"><div id="news-list"></div></div>
        </div>

        <div class="controls">
            <div class="switch-wrap"><span>SESLİ YANIT</span><label class="switch"><input type="checkbox" id="voice-switch" checked><span class="slider"></span></label></div>
        </div>
    </div>

    <script>
        // --- DEĞİŞKENLER ---
        let isListening = false;
        const newsDatabase = [
            "Ekonomi: Piyasalarda dijital varlık kullanımı %15 arttı.",
            "Teknoloji: Kuantum işlemcilerde yeni bir hız rekoru kırıldı.",
            "Uzay: Mars kolonisinde ilk oksijen üretimi başarıyla tamamlandı.",
            "Bilim: Yapay zeka tabanlı ilaçlar klinik testlere başladı."
        ];

        // --- AÇILIŞ EKRANI ---
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro').style.display = 'none';
                    document.getElementById('app').style.opacity = '1';
                    loadNews();
                }, 1000);
            }, 2500);
            setInterval(updateClock, 1000);
        };

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }

        function loadNews() {
            const list = document.getElementById('news-list');
            newsDatabase.forEach(n => {
                let div = document.createElement('div');
                div.className = 'news-card';
                div.innerText = n;
                list.appendChild(div);
            });
        }

        // --- MATEMATİK MOTORU ---
        function jarvisMath(input) {
            let text = input.toLowerCase().trim();
            const wordToSymbol = {
                "artı": "+", "topla": "+", "eksi": "-", "çıkar": "-", 
                "çarpı": "*", "çarp": "*", "x": "*", "bölü": "/", "böl": "/", ":": "/"
            };

            for (let key in wordToSymbol) {
                text = text.replace(new RegExp(key, 'g'), wordToSymbol[key]);
            }

            // Regex: (sayı) (operatör) (sayı) kalıbını bulur
            let match = text.match(/(\d+)\s*([\+\-\*\/])\s*(\d+)/);

            if (match) {
                const n1 = parseFloat(match[1]);
                const op = match[2];
                const n2 = parseFloat(match[3]);
                let res;

                switch (op) {
                    case '+': res = n1 + n2; break;
                    case '-': res = n1 - n2; break;
                    case '*': res = n1 * n2; break;
                    case '/': res = n2 !== 0 ? n1 / n2 : "Tanımsız (Sıfıra Bölme)"; break;
                }

                let response = `İşlem sonucu: ${res}, Efendim.`;
                speakAndShow(response);
                return true;
            }
            return false;
        }

        // --- YANIT VE SES ---
        function speakAndShow(text) {
            document.getElementById('transcript-text').innerText = text;
            if (document.getElementById('voice-switch').checked) {
                const synth = window.speechSynthesis;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR';
                utterance.rate = 1.1;
                synth.speak(utterance);
            }
        }

        function handleChat(e) {
            if (e.key === "Enter") {
                let val = e.target.value;
                if (!jarvisMath(val)) {
                    speakAndShow("Bunu henüz öğrenmedim Efendim.");
                }
                e.target.value = "";
            }
        }

        // --- SES TANIMA (DENEK) ---
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = SpeechRec ? new SpeechRec() : null;
        if(rec) {
            rec.lang = 'tr-TR';
            rec.onresult = (e) => {
                let speech = e.results[0][0].transcript;
                if(!jarvisMath(speech)) {
                    document.getElementById('transcript-text').innerText = "Duyulan: " + speech;
                }
            };
            rec.onend = () => {
                isListening = false;
                document.getElementById('main-orb').classList.remove('listening');
            };
        }

        function toggleMic() {
            if(!rec) return alert("Tarayıcı ses tanımayı desteklemiyor.");
            if(isListening) {
                rec.stop();
            } else {
                rec.start();
                isListening = true;
                document.getElementById('main-orb').classList.add('listening');
            }
        }
    </script>
</body>
</html>
