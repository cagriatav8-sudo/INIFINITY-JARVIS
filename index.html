<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity OS - by Çağrı Atav</title>
    <style>
        /* TEMA AYARLARI - Tam Karanlık Mod */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0b; /* Derin Siyah */
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Üst Panel (StatusBar) */
        .status-bar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            background: rgba(255, 255, 255, 0.05);
            font-size: 14px;
            color: #a855f7; /* Mor tema rengi */
        }

        /* Navigasyon - by Çağrı Atav */
        .navbar { position: fixed; top: 40px; left: 20px; z-index: 1001; }
        
        .brand-link {
            cursor: pointer;
            font-weight: bold;
            color: #a855f7; 
            padding: 12px 24px;
            border: 2px solid #a855f7;
            border-radius: 30px;
            background: rgba(168, 85, 247, 0.1);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        .brand-link:hover {
            transform: scale(1.1);
            background: #a855f7;
            color: white;
        }

        .side-menu {
            position: fixed;
            top: 100px;
            left: -280px;
            width: 240px;
            background: #151515;
            border: 1px solid #a855f7;
            padding: 25px;
            border-radius: 0 25px 25px 0;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .side-menu.active { left: 0; }

        /* Kart Yapısı (Parent) */
        .card {
            width: 350px;
            padding: 30px;
            background: #1a1a1a;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover { border-color: #a855f7; }

        /* Buton (Child) */
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
            transition: 0.2s;
        }

        .delete-btn:active { transform: scale(0.9); }

        /* Haber Okuma Alanı */
        #haberEkrani {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(168, 85, 247, 0.15);
            border-left: 5px solid #a855f7;
            width: 85%;
            max-width: 600px;
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="status-bar">
        <span id="battery">🔋 Şarj: %85</span> &nbsp; | &nbsp; 
        <span id="clock">00:00</span>
    </div>

    <nav class="navbar">
        <div id="menuToggle" class="brand-link">by Çağrı Atav</div>
        <div id="sideMenu" class="side-menu">
            <h3 style="color:#a855f7; margin-top:0">HUDAYR Ses Ayarı</h3>
            <label style="cursor:pointer">
                <input type="radio" name="voice" value="kadin" checked> 👩 Kız Sesi
            </label><br><br>
            <label style="cursor:pointer">
                <input type="radio" name="voice" value="erkek"> 👨 Erkek Sesi
            </label>
        </div>
    </nav>

    <div id="parentCard" class="card">
        <h2 style="color:#a855f7">Sistem Aktif</h2>
        <p>Haberleri okutmak için "Haberler" de veya butona tıkla.</p>
        <button id="childButton" class="delete-btn">Sistemi Kapat (Bubbling)</button>
    </div>

    <div id="haberEkrani"></div>

    <script>
        // Elementler
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const card = document.getElementById('parentCard');
        const button = document.getElementById('childButton');
        const haberEkrani = document.getElementById('haberEkrani');

        // --- 1. DİNAMİK ŞARJ VE SAAT ---
        function updateStatus() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            // Gerçek batarya verisi çekmeye çalışalım
            if (navigator.getBattery) {
                navigator.getBattery().then(bat => {
                    document.getElementById('battery').innerText = `🔋 Şarj: %${Math.round(bat.level * 100)}`;
                });
            }
        }
        setInterval(updateStatus, 1000);
        updateStatus();

        // --- 2. MENÜ KONTROL ---
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            sideMenu.classList.toggle('active');
            console.log("LOG: Menü açıldı, ses seçimi hazır.");
        });

        // --- 3. iPHONE & XIAOMI UYUMLU SES TANIMA ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;

            recognition.onresult = (event) => {
                const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
                console.log("Komut Geldi:", command);
                
                if (command.includes("haberler") || command.includes("selam")) {
                    haberOkuVeYaz("Selam Musab Efendim. Bugün sizin için harika haberlerim var. Infinity sistemi sorunsuz çalışıyor.");
                }
            };
            
            // iPhone için ilk tıklamada izin al
            document.body.addEventListener('click', () => {
                recognition.start();
                console.log("Sistem dinlemeye başladı...");
            }, { once: true });
        }

        // --- 4. AYNI ANDA YAZ VE OKU (Kız/Erkek Seçimli) ---
        function haberOkuVeYaz(metin) {
            // Ekrana Yaz
            haberEkrani.style.display = 'block';
            haberEkrani.innerText = metin;

            // Sesli Oku
            const utterance = new SpeechSynthesisUtterance(metin);
            const seciliSes = document.querySelector('input[name="voice"]:checked').value;
            
            utterance.lang = 'tr-TR';
            utterance.pitch = (seciliSes === 'kadin') ? 1.3 : 0.7; // Kız ince, Erkek kalın ses
            utterance.rate = 1.0;

            window.speechSynthesis.speak(utterance);
            console.log("HUDAYR: Haberler seslendiriliyor...");
        }

        // --- 5. EVENT BUBBLING (KART SİLME) ---
        button.addEventListener('click', (e) => {
            console.log("AŞAMA 1: Butona tıklandı (Child). Olay yukarı taşınıyor...");
        });

        card.addEventListener('click', () => {
            console.log("AŞAMA 2: Kart (Parent) bubbling ile tıklamayı yakaladı!");
            haberOkuVeYaz("Kart siliniyor efendim. İşlem başarılı.");
            setTimeout(() => {
                card.style.transform = "scale(0)";
                card.style.opacity = "0";
                setTimeout(() => card.remove(), 300);
            }, 1000);
        });

        // Menü dışına tıklanırsa kapat
        document.addEventListener('click', () => sideMenu.classList.remove('active'));
    </script>
</body>
</html>
