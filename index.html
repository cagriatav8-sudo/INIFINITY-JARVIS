<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS — INFINITY™ 1000x</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #00aaff;
            --accent-color: #00eeff;
            --bg: #020810;
            --panel: rgba(4, 15, 30, 0.9);
            --r-lg: 30px;
            --r-md: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.4s ease; }
        body { background: var(--bg); color: #c0e8ff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }

        /* GİRİŞ EKRANI */
        #intro {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: opacity 1s ease;
        }
        .inf-logo { width: 180px; stroke: var(--main-color); stroke-width: 2.5; fill: none; animation: draw 3s infinite alternate; }
        @keyframes draw { 0% { stroke-dasharray: 0 500; } 100% { stroke-dasharray: 500 0; filter: drop-shadow(0 0 30px var(--main-color)); } }

        /* APP UI */
        #app { opacity: 0; height: 100%; display: flex; flex-direction: column; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(2,8,16,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,170,255,0.1); }

        /* YAN MENÜ */
        #drawer {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: var(--panel); z-index: 2000; padding: 40px 20px;
            border-right: 1px solid var(--main-color);
        }
        .drawer-open { left: 0 !important; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: var(--r-md); background: rgba(0,170,255,0.1); cursor: pointer; }

        /* METİN ALANI */
        #transcript-area {
            position: absolute; top: 85px; width: 90%; max-width: 500px;
            background: rgba(0, 0, 0, 0.95); border: 1px solid var(--main-color);
            border-radius: var(--r-lg); padding: 25px; display: none;
            z-index: 500; backdrop-filter: blur(20px); max-height: 40%; overflow-y: auto;
        }

        /* ORB */
        .orb-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 2px solid var(--main-color);
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px var(--main-color); cursor: pointer;
        }
        .listening { animation: pulse 0.5s infinite alternate; border-color: var(--accent-color); }
        @keyframes pulse { to { transform: scale(1.08); box-shadow: 0 0 50px var(--accent-color); } }

        /* HABERLER */
        #news-panel { width: 90%; height: 210px; margin: 10px auto; background: var(--panel); border-radius: var(--r-md); padding: 15px; overflow-y: auto; border: 1px solid var(--main-color); }
        .news-card { font-size: 13px; margin-bottom: 10px; padding: 12px; background: rgba(0,170,255,0.05); border-radius: 12px; border-left: 4px solid var(--main-color); }

        .stats { display: flex; gap: 10px; width: 90%; margin: 10px auto; }
        .stat-box { flex: 1; background: var(--panel); padding: 12px; border-radius: var(--r-md); text-align: center; border: 1px solid var(--main-color); }
        .stat-box b { display: block; color: var(--accent-color); font-family: 'Orbitron'; font-size: 18px; }

        footer { padding: 10px; text-align: center; font-size: 10px; opacity: 0.5; font-family: 'Orbitron'; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="intro">
        <svg class="inf-logo" viewBox="0 0 100 50"><path d="M30,25 C30,15 15,15 15,25 C15,35 30,35 30,25 C30,15 45,15 45,25 C45,35 30,35 30,25" /></svg>
        <div style="margin-top:20px; font-family:'Orbitron'; color:var(--main-color); letter-spacing:8px;">INFINITY TM</div>
    </div>

    <div id="drawer">
        <h3 style="font-family:'Orbitron'; margin-bottom:20px; color:var(--main-color);">JARVIS 1000x BELLEK</h3>
        <div class="menu-item" onclick="toggleTranscript()">📝 Metne Dök</div>
        <div class="menu-item" onclick="location.reload()">🔄 Belleği Yenile</div>
    </div>

    <div id="app">
        <header>
            <div onclick="toggleDrawer()" style="cursor:pointer; font-size:26px;">☰</div>
            <div style="font-family:'Orbitron'; letter-spacing:4px;">JARVIS</div>
            <div id="clock">00:00</div>
        </header>

        <div style="flex:1; display:flex; flex-direction:column; align-items:center; position:relative;">
            <div class="stats">
                <div class="stat-box">ENERJİ<b id="bat">--%</b></div>
                <div class="stat-box">DURUM<b id="status-label">BAĞLI</b></div>
            </div>

            <div id="transcript-area"><p id="transcript-text" style="color:var(--accent-color);">Bellek 1000 kayıtla optimize edildi Efendim.</p></div>

            <div class="orb-btn" id="main-orb" onclick="toggleMic()">
                <div style="width:90px; height:90px; border-radius:50%; background:radial-gradient(circle, var(--main-color) 0%, transparent 75%); opacity:0.6;"></div>
            </div>

            <div id="news-panel">
                <p style="font-size:10px; color:var(--main-color); margin-bottom:12px; letter-spacing:2px; font-weight:bold;">SİSTEM GÜNDEMİ (1000 HABER HAVUZU)</p>
                <div id="news-list">Senkronizasyon...</div>
            </div>
        </div>

        <footer>WITH İNFİNİTY TM FROM ÇAĞRI ATAV</footer>
    </div>

    <script>
        // 1000 HABER HAVUZU ÜRETİCİSİ
        const subjects = ["Ekonomi", "Teknoloji", "Spor", "Dünya", "Bilim", "Sanat", "Havacılık", "Otomobil", "Yapay Zeka", "Uzay"];
        const predicates = ["kritik gelişme kaydedildi.", "yeni bir döneme giriyor.", "beklentilerin üzerinde sonuçlandı.", "tüm dünyada yankı uyandırdı.", "uzmanlar tarafından analiz edildi.", "gelecek planları açıklandı.", "rekor seviyeye ulaştı.", "yenilikçi adımlar atıldı.", "başarıyla tamamlandı.", "yeni bir tartışma başlattı."];
        
        const newsDatabase = [];
        for (let i = 1; i <= 1000; i++) {
            let sub = subjects[Math.floor(Math.random() * subjects.length)];
            let pre = predicates[Math.floor(Math.random() * predicates.length)];
            newsDatabase.push(`${sub} Gündemi: Kayıt #${i} - Bu alanda ${pre}`);
        }

        let isListening = false;
        let batLevel = 100;
        let selectedNews = [];
        let newsIndex = 0;
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'tr-TR';

        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('app').style.opacity = '1';
                init();
            }, 1000);
        }, 3000);

        function init() {
            updateClock();
            loadOfflineNews();
            updateBattery();
        }

        function updateClock() {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            }, 1000);
        }

        function loadOfflineNews() {
            const list = document.getElementById('news-list');
            selectedNews = newsDatabase.sort(() => 0.5 - Math.random()).slice(0, 30);
            list.innerHTML = selectedNews.map(txt => `<div class="news-card">${txt}</div>`).join('');
            newsIndex = 0;
        }

        function toggleDrawer() { document.getElementById('drawer').classList.toggle('drawer-open'); }
        function toggleTranscript() {
            const area = document.getElementById('transcript-area');
            area.style.display = area.style.display === 'block' ? 'none' : 'block';
            toggleDrawer();
        }

        async function updateBattery() {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                const up = () => {
                    batLevel = Math.round(b.level * 100);
                    document.getElementById('bat').innerText = `%${batLevel}`;
                    updateTheme(batLevel);
                };
                up(); b.onlevelchange = up;
            }
        }

        function updateTheme(level) {
            const root = document.documentElement;
            if(level <= 20) root.style.setProperty('--main-color', '#ff4444');
            else if(level <= 50) root.style.setProperty('--main-color', '#00ff88');
            else root.style.setProperty('--main-color', '#00aaff');
        }

        function toggleMic() {
            if(!isListening) rec.start();
            else rec.stop();
        }

        rec.onstart = () => {
            isListening = true;
            document.getElementById('main-orb').classList.add('listening');
        };

        rec.onend = () => {
            isListening = false;
            document.getElementById('main-orb').classList.remove('listening');
        };

        rec.onresult = (e) => {
            const talk = e.results[e.results.length - 1][0].transcript.toLowerCase();
            processJarvis(talk);
        };

        function processJarvis(msg) {
            let response = "";

            if (msg.includes("bugün ne oldu") || msg.includes("haberleri say")) {
                newsIndex = 0;
                let newsToSay = selectedNews.slice(0, 5);
                response = "Efendim, bugün öne çıkan haberler şunlar: " + newsToSay.join(". ") + ". Devam etmemi ister misiniz?";
                newsIndex = 5;
            } 
            else if (msg.includes("devam et") || msg.includes("devam")) {
                if (newsIndex >= selectedNews.length) {
                    response = "1000 haberlik havuzdan seçilen tüm kayıtları sundum efendim. Başka bir arzunuz?";
                } else {
                    let newsToSay = selectedNews.slice(newsIndex, newsIndex + 5);
                    response = "Devam ediyorum: " + newsToSay.join(". ") + ". Daha fazlası için devam et diyebilirsiniz.";
                    newsIndex += 5;
                }
            }
            else if (msg.includes("nasılsın") || msg.includes("selam")) {
                response = `İyiyim efendim. Saat ${document.getElementById('clock').innerText}. Şarjınız yüzde ${batLevel}. 1000 haberlik belleğim senkronize edildi.`;
            }
            else {
                const math = msg.match(/(\d+)\s*(artı|eksi|çarpı|bölü|\+|\-|\*|\/)\s*(\d+)/);
                if (math) {
                    let n1 = parseFloat(math[1]), op = math[2], n2 = parseFloat(math[3]), res = 0;
                    if(op.includes("artı") || op === "+") res = n1 + n2;
                    else if(op.includes("eksi") || op === "-") res = n1 - n2;
                    else if(op.includes("çarpı") || op === "*") res = n1 * n2;
                    else if(op.includes("bölü") || op === "/") res = n1 / n2;
                    response = `Sonuç ${res} efendim.`;
                } else {
                    response = "Sizi dinliyorum efendim.";
                }
            }
            speak(response);
        }

        function speak(t) {
            document.getElementById('transcript-text').innerText = t;
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'tr-TR';
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
