<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS — with INFINITY™</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #00aaff;
            --accent: #00eeff;
            --bg: #020810;
            --panel: rgba(4, 15, 30, 0.9);
            --r-lg: 30px; /* Çok yumuşak köşeler */
            --r-md: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #c0e8ff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }

        /* GİRİŞ EKRANI - BÜYÜTÜLMÜŞ INFINITY */
        #intro {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: opacity 1.2s ease;
        }
        .inf-container { text-align: center; }
        .inf-logo {
            width: 250px; height: 120px; /* Logo büyütüldü */
            stroke: var(--blue); stroke-width: 2.5; fill: none;
            filter: drop-shadow(0 0 20px var(--blue));
            animation: draw 3s infinite alternate;
        }
        @keyframes draw {
            0% { stroke-dasharray: 0 500; filter: drop-shadow(0 0 10px var(--blue)); }
            100% { stroke-dasharray: 500 0; filter: drop-shadow(0 0 40px var(--accent)); }
        }
        .inf-text {
            margin-top: 15px; font-family: 'Orbitron'; font-size: 18px;
            letter-spacing: 8px; color: var(--blue); text-transform: uppercase;
        }

        /* ANA UYGULAMA */
        #app { opacity: 0; transition: 1.5s; height: 100%; display: flex; flex-direction: column; }
        header { 
            padding: 20px; display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; background: rgba(2,8,16,0.5); backdrop-filter: blur(10px);
        }

        /* MOBİL UYUMLU LAYOUT */
        .content-grid {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: space-around; padding: 10px; position: relative;
        }

        /* JARVIS DAİRE (ORB) */
        .orb-wrapper { position: relative; display: flex; align-items: center; justify-content: center; }
        .orb {
            width: 180px; height: 180px; border-radius: 50%;
            border: 2px solid var(--blue); box-shadow: 0 0 25px var(--blue);
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .listening { animation: pulse 0.5s infinite alternate; border-color: var(--accent); }
        @keyframes pulse { to { transform: scale(1.1); box-shadow: 0 0 50px var(--accent); } }

        /* HABERLER - TELEFONDA BUTONLARI KAPATMASIN DİYE ALT KISMA ALINDI */
        #news-panel {
            width: 90%; max-width: 400px; background: var(--panel);
            border-radius: var(--r-md); padding: 15px; border: 1px solid rgba(0,170,255,0.2);
            max-height: 150px; overflow-y: auto; margin-bottom: 20px;
        }
        .news-item { font-size: 13px; margin-bottom: 8px; border-left: 3px solid var(--blue); padding-left: 8px; }

        /* YAN BİLGİLER */
        .stats { display: flex; gap: 10px; width: 90%; justify-content: center; }
        .stat-card {
            background: var(--panel); padding: 15px; border-radius: var(--r-md);
            flex: 1; text-align: center; border: 1px solid rgba(0,170,255,0.1);
        }
        .stat-card b { display: block; color: var(--accent); font-family: 'Orbitron'; }

        footer { padding: 15px; text-align: center; font-size: 10px; opacity: 0.5; letter-spacing: 2px; }

        /* AYARLAR */
        #settings {
            position: fixed; top: 0; right: -100%; width: 80%; height: 100%;
            background: #020810; z-index: 10000; transition: 0.5s; padding: 40px 20px;
            border-left: 1px solid var(--blue);
        }
    </style>
</head>
<body>

    <div id="intro">
        <div class="inf-container">
            <svg class="inf-logo" viewBox="0 0 100 50">
                <path d="M30,25 C30,15 15,15 15,25 C15,35 30,35 30,25 C30,15 45,15 45,25 C45,35 30,35 30,25" />
            </svg>
            <div class="inf-text">INFINITY TM</div>
        </div>
    </div>

    <div id="app">
        <header>
            <div onclick="openMenu()" style="cursor:pointer; font-size:24px;">☰</div>
            <div style="font-family:'Orbitron'; letter-spacing:3px;">JARVIS</div>
            <div id="clock">00:00</div>
        </header>

        <div class="content-grid">
            <div class="stats">
                <div class="stat-card">HAVA<b id="temp">20°C</b></div>
                <div class="stat-card">NEM<b id="hum">%55</b></div>
            </div>

            <div class="orb-wrapper" id="mic-trigger">
                <div class="orb" id="orb-core">
                    <div style="width:120px; height:120px; border-radius:50%; background:radial-gradient(circle, var(--blue) 0%, transparent 70%); opacity:0.4;"></div>
                </div>
            </div>

            <div id="news-panel">
                <p style="font-size:10px; color:var(--blue); margin-bottom:10px; letter-spacing:2px;">GÜNCEL AKIŞ</p>
                <div id="news-content">Haberler yükleniyor...</div>
            </div>
            
            <div id="status" style="font-size:12px; color:var(--blue);">Sizi dinliyorum efendim...</div>
        </div>

        <footer>
            WITH İNFİNİTY TM FROM ÇAĞRI ATAV
        </footer>
    </div>

    <div id="settings">
        <div onclick="openMenu()" style="text-align:right; margin-bottom:30px; font-size:24px;">✕</div>
        <h2 style="font-family:'Orbitron'; margin-bottom:20px;">SİSTEM</h2>
        <p>GitHub: cagriatav8-sudo/JARVIS-NF-N-TY</p>
        <p>Gmail: cagriatav8@gmail.com</p>
        <p>Tel: 0541 221 39 40</p>
    </div>

    <script>
        // Giriş Ekranı
        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('app').style.opacity = '1';
                startJarvis();
            }, 1200);
        }, 3500);

        function openMenu() {
            const s = document.getElementById('settings');
            s.style.right = s.style.right === '0px' ? '-100%' : '0px';
        }

        function startJarvis() {
            // Saat
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
            }, 1000);

            // Haberler (Hata korumalı)
            fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.cnnturk.com/feed/rss/all/news')
            .then(res => res.json())
            .then(data => {
                document.getElementById('news-content').innerHTML = data.items.slice(0,3).map(i => `<div class="news-item">${i.title}</div>`).join('');
            }).catch(() => {
                document.getElementById('news-content').innerHTML = "<div class='news-item'>Haber akışı aktif.</div>";
            });

            // Ses Tanıma
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'tr-TR';
            rec.continuous = true;
            rec.onstart = () => document.getElementById('orb-core').classList.add('listening');
            rec.onresult = (e) => {
                const talk = e.results[e.results.length - 1][0].transcript.toLowerCase();
                if(talk.includes("jarvis") || talk.includes("servis") || talk.includes("selam")) {
                    speak("Efendim?");
                }
            };
            rec.start();
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'tr-TR';
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
