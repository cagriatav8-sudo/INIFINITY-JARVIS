<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS — INFINITY™</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main: #00aaff; 
            --accent: #00eeff; 
            --bg: #020810; 
            --panel: rgba(4, 15, 30, 0.98);
            --text: #c0e8ff;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* Renk geçiş animasyonları ayrı bir class ile */
        .theme-transition,
        .theme-transition * {
            transition: color 2s ease, border-color 2s ease, box-shadow 2s ease, background-color 2s ease !important;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw; 
            touch-action: manipulation;
            transition: background 2s ease, color 2s ease;
        }

        #intro { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; transition: opacity 1s; }
        .inf-logo { width: 150px; stroke: var(--main); stroke-width: 2.5; fill: none; animation: draw 3s infinite alternate; }
        @keyframes draw { 0% { stroke-dasharray: 0 500; } 100% { stroke-dasharray: 500 0; filter: drop-shadow(0 0 30px var(--main)); } }

        #app { opacity: 0; height: 100%; display: flex; flex-direction: column; transition: opacity 1.5s; }
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(2,8,16,0.8); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; }

        #drawer { position: fixed; top: 0; left: -320px; width: 280px; height: 100%; background: var(--panel); z-index: 2000; padding: 40px 20px; border-right: 1px solid var(--main); box-shadow: 10px 0 30px #000; transition: left 0.5s ease; }
        .drawer-open { left: 0 !important; }
        .menu-item { padding: 15px; margin-bottom: 12px; border-radius: 15px; background: rgba(255,255,255,0.03); cursor: pointer; display: flex; align-items: center; justify-content: space-between; }

        .draggable { position: absolute; width: 92%; max-width: 380px; background: var(--panel); border: 1px solid var(--main); border-radius: 20px; padding: 20px; z-index: 500; backdrop-filter: blur(25px); box-shadow: 0 0 40px rgba(0,0,0,0.8); cursor: move; display: none; }
        .panel-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; pointer-events: none; }
        .close-btn { pointer-events: auto; cursor: pointer; color: var(--main); font-size: 20px; }

        .main-content { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ORB — telefon uyumlu büyük dokunma alanı */
        .orb-btn { 
            width: 160px; height: 160px; border-radius: 50%; 
            border: 2px solid var(--main); 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 20px var(--main); 
            cursor: pointer; z-index: 10; position: relative;
            /* Dokunma geri bildirimi */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            transition: box-shadow 0.3s, transform 0.1s;
        }
        .orb-btn:active { transform: scale(0.95); }
        .listening { box-shadow: 0 0 60px var(--main), inset 0 0 25px var(--main) !important; }

        .orb-inner {
            width: 100px; height: 100px; border-radius: 50%; 
            background: radial-gradient(circle, var(--main), transparent 85%); 
            opacity: 0.6; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }

        /* Mikrofon ikonu */
        .mic-icon {
            pointer-events: none;
            position: absolute;
            width: 36px; height: 36px;
        }

        #news-panel { width: 92%; height: 220px; background: var(--panel); border-radius: 22px; padding: 18px; overflow-y: auto; border: 1px solid var(--main); margin-top: 20px; }
        .news-card { font-size: 13px; margin-bottom: 10px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; border-left: 4px solid var(--main); line-height: 1.4; }

        .controls { position: fixed; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; }
        .switch-wrap { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--panel); padding: 10px 15px; border-radius: 20px; border: 1px solid var(--main); min-width: 155px; font-size: 10px; }
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #222; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--main); }
        input:checked + .slider:before { transform: translateX(16px); }

        select { background: #000; color: var(--main); border: 1px solid var(--main); border-radius: 10px; padding: 3px; outline: none; }
        #chat-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--main); color: white; padding: 12px; border-radius: 12px; outline: none; margin-top: 10px; font-family: 'Rajdhani', sans-serif; font-size: 15px; }

        /* Şarj göstergesi */
        #bat-display {
            font-size: 11px;
            color: var(--main);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            transition: color 2s ease;
        }

        /* Beyaz tema (<%10) */
        body.white-theme {
            --main: #ffffff;
            --bg: #f0f0f0;
            --panel: rgba(240,240,240,0.98);
            --text: #111111;
            background: #f0f0f0 !important;
            color: #111 !important;
        }
        body.white-theme #news-panel,
        body.white-theme .draggable,
        body.white-theme .switch-wrap,
        body.white-theme #drawer {
            background: rgba(220,220,220,0.98);
            color: #111;
        }
        body.white-theme .news-card {
            background: rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <div id="intro">
        <svg class="inf-logo" viewBox="0 0 100 50">
            <path d="M30,25 C30,15 15,15 15,25 C15,35 30,35 30,25 C30,15 45,15 45,25 C45,35 30,35 30,25" />
        </svg>
    </div>
    
    <div id="drawer">
        <div style="font-family:'Orbitron'; color:var(--main); margin-bottom:20px;">SİSTEM PANELİ</div>
        <div class="menu-item"><span>SES TONU</span><select id="voice-gender"><option value="erkek">Erkek</option><option value="kadin">Kadın</option></select></div>
        <div class="menu-item" onclick="location.reload()">🔄 Yenile</div>
        <div style="margin-top:auto; font-weight:bold; color:var(--main); text-align:center; padding-top:30px;">BY ÇAĞRI ATAV</div>
    </div>

    <div id="app">
        <header>
            <div onclick="document.getElementById('drawer').classList.toggle('drawer-open')" style="cursor:pointer; font-size:26px; color:var(--main);">☰</div>
            <div style="font-family:'Orbitron'; color:var(--main); letter-spacing:2px; font-weight:bold;">JARVIS</div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
                <div id="clock">00:00</div>
                <div id="bat-display">🔋 —%</div>
            </div>
        </header>
        
        <div class="main-content">
            <div id="transcript-area" class="draggable" style="top: 80px; left: 10px;">
                <div class="panel-header"><span>ALTYAZI</span><span class="close-btn" onclick="closeBox('transcript-area')">✖</span></div>
                <p id="transcript-text">Gündem verileri analiz edildi Efendim.</p>
            </div>
            
            <div id="input-area" class="draggable" style="top: 240px; left: 10px;">
                <div class="panel-header"><span>KLAVYE</span><span class="close-btn" onclick="closeBox('input-area')">✖</span></div>
                <input type="text" id="chat-input" placeholder="Emredin..." onkeypress="handleChat(event)">
            </div>
            
            <!-- ORB — Hem click hem touch ile çalışır -->
            <div class="orb-btn" id="main-orb" role="button" aria-label="Mikrofon">
                <div class="orb-inner">
                    <!-- Mikrofon SVG ikonu -->
                    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="9" y="2" width="6" height="12" rx="3" fill="white" opacity="0.9"/>
                        <path d="M5 11c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <line x1="12" y1="18" x2="12" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="22" x2="16" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
            
            <div id="news-panel"><div id="news-list"></div></div>
        </div>

        <div class="controls">
            <div class="switch-wrap"><span>METİN PANELİ</span><label class="switch"><input type="checkbox" id="panel-switch" onchange="syncPanels()"><span class="slider"></span></label></div>
            <div class="switch-wrap"><span>SESLİ YANIT</span><label class="switch"><input type="checkbox" id="voice-switch" checked><span class="slider"></span></label></div>
        </div>
    </div>

    <script>
        let isListening = false;
        let newsDatabase = [
            "Ekonomi: Merkez Bankası faiz kararını açıkladı, piyasalar dengeye oturdu.",
            "Spor: Süper Lig'de zirve mücadelesi heyecanı devam ediyor, puanlar çok yakın.",
            "Teknoloji: Yerli yapay zeka projeleri dünya genelinde ses getirmeye başladı.",
            "Dünya: Küresel iklim zirvesinde yeni çevre koruma kararları alındı.",
            "Uzay: NASA'nın yeni ay görevi için hazırlanan roket fırlatma rampasına getirildi.",
            "Havacılık: Türkiye'nin insansız savaş uçağı prototipi yeni testlerden başarıyla geçti.",
            "Sağlık: Yeni geliştirilen yöntemle iğnesiz kan tahlili artık mümkün.",
            "Otomobil: Elektrikli araçlarda batarya ömrünü iki katına çıkaran yeni teknoloji tanıtıldı.",
            "Sanat: Ünlü ressamın daha önce görülmemiş bir tablosu keşfedildi.",
            "Eğitim: Okullarda kodlama ve robotik eğitimleri için müfredat güncellendi."
        ];
        let newsIndex = 0;
        let currentBatLevel = 100;

        // ========================
        // SPEECH RECOGNITION SETUP
        // ========================
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = SpeechRec ? new SpeechRec() : null;
        if (rec) { rec.lang = 'tr-TR'; rec.continuous = false; rec.interimResults = false; }

        // ========================
        // ORB BUTTON — TOUCH + CLICK UYUMLU
        // ========================
        const orbBtn = document.getElementById('main-orb');

        // Touch cihazlar için
        orbBtn.addEventListener('touchstart', function(e) {
            e.preventDefault(); // çift tetiklenmeyi önle
            toggleMic();
        }, { passive: false });

        // Desktop için
        orbBtn.addEventListener('click', function(e) {
            // Touch eventinden sonra click de tetiklenirse engelle
            if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
            toggleMic();
        });

        // ========================
        // INTRO + INIT
        // ========================
        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('app').style.opacity = '1';
                init();
            }, 1000);
        }, 2000);

        function init() {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            }, 1000);
            updateBattery();
            document.getElementById('news-list').innerHTML = newsDatabase.map(n => `<div class="news-card">${n}</div>`).join('');
            makeDraggable(document.getElementById("transcript-area"));
            makeDraggable(document.getElementById("input-area"));
        }

        // ========================
        // BATTERY — Safari uyumlu
        // ========================
        async function updateBattery() {
            // Safari Battery API desteklemez — fallback simülasyon
            if (navigator.getBattery) {
                try {
                    const b = await navigator.getBattery();
                    const update = () => {
                        const level = Math.round(b.level * 100);
                        currentBatLevel = level;
                        document.getElementById('bat-display').innerText = `🔋 ${level}%`;
                        applyTheme(level);
                    };
                    update();
                    b.addEventListener('levelchange', update);
                } catch(e) {
                    // Battery API hata verdi, simülasyon yap
                    simulateBattery();
                }
            } else {
                // Safari veya desteklemeyen tarayıcı
                simulateBattery();
            }
        }

        function simulateBattery() {
            // Safari'de gerçek şarj alınamaz, görsel demo için
            const fakeLevel = 72; // demo değeri
            currentBatLevel = fakeLevel;
            document.getElementById('bat-display').innerText = `🔋 ${fakeLevel}%`;
            applyTheme(fakeLevel);
        }

        // ========================
        // TEMA — SMOOTH RENK GEÇİŞİ
        // Mavi: 100→51, Yeşil: 50→21, Kırmızı: 20→11, Beyaz: ≤10
        // ========================
        function applyTheme(level) {
            const body = document.body;

            // %10 ve altı: beyaz tema (geçişsiz, ani)
            if (level <= 10) {
                body.classList.add('white-theme');
                document.documentElement.style.setProperty('--main', '#ffffff');
                return;
            }

            body.classList.remove('white-theme');

            // Renk interpolasyon fonksiyonu
            let r, g, b;

            if (level > 50) {
                // 51-100: Mavi (#00aaff) sabit
                r = 0; g = 170; b = 255;
            } else if (level > 20) {
                // 21-50: Mavi → Yeşil geçişi
                // level=50 → yeşil, level=21 → mavi
                const t = (level - 21) / (50 - 21); // 0=mavi, 1=yeşil
                // Mavi: 0,170,255 → Yeşil: 0,255,136
                r = 0;
                g = Math.round(170 + t * (255 - 170)); // 170→255
                b = Math.round(255 + t * (136 - 255)); // 255→136
            } else {
                // 11-20: Yeşil → Kırmızı geçişi
                const t = (level - 11) / (20 - 11); // 0=kırmızı, 1=yeşil
                // Kırmızı: 255,68,68 → Yeşil: 0,255,136
                r = Math.round(255 - t * 255);   // 255→0
                g = Math.round(68 + t * (255 - 68)); // 68→255
                b = Math.round(68 + t * (136 - 68)); // 68→136
            }

            const hex = `#${toHex(r)}${toHex(g)}${toHex(b)}`;
            document.documentElement.style.setProperty('--main', hex);
        }

        function toHex(n) {
            return Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2, '0');
        }

        // ========================
        // MIC TOGGLE
        // ========================
        function toggleMic() {
            // Konuşma sentezini "uyandır" (iOS için gerekli)
            const wake = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(wake);

            if (!isListening && rec) {
                try { rec.start(); } catch (e) { console.warn('rec.start:', e); }
            } else if (rec) {
                try { rec.stop(); } catch (e) { console.warn('rec.stop:', e); }
            } else {
                // Tarayıcı speech recognition desteklemiyor
                speak("Üzgünüm Efendim, bu tarayıcı mikrofonu desteklemiyor. Lütfen metin kutusunu kullanın.");
            }
        }

        if (rec) {
            rec.onstart = () => {
                isListening = true;
                orbBtn.classList.add('listening');
            };
            rec.onend = () => {
                isListening = false;
                orbBtn.classList.remove('listening');
            };
            rec.onerror = (e) => {
                isListening = false;
                orbBtn.classList.remove('listening');
                console.warn('Speech error:', e.error);
            };
            rec.onresult = (e) => {
                const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase();
                processCommand(transcript);
            };
        }

        // ========================
        // KOMUT İŞLEME
        // ========================
        function handleChat(e) {
            if (e.key === 'Enter') {
                processCommand(e.target.value.toLowerCase());
                e.target.value = '';
            }
        }

        function processCommand(msg) {
            let res = "";

            if (msg.includes("haberi oku") || msg.includes("haberleri oku") || msg.includes("bugün ne oldu") || msg.includes("haberler") || msg.includes("haber")) {
                newsIndex = 0;
                let batch = newsDatabase.slice(0, 5);
                res = "Efendim, bugünün özeti şöyledir: " + batch.join(". ") + ". Devam etmemi ister misiniz?";
                newsIndex = 5;

            } else if (msg.includes("devam et") || msg.includes("devam")) {
                let batch = newsDatabase.slice(newsIndex, newsIndex + 5);
                res = batch.length > 0
                    ? "Haberlere devam ediyorum: " + batch.join(". ")
                    : "Tüm güncel haberler bitti Efendim.";
                newsIndex += 5;

            } else if (msg.includes("selam") || msg.includes("nasılsın")) {
                res = "İyiyim Efendim. By Çağrı ATAV imzalı sistemler stabil. Haberleri okumamı ister misiniz?";

            } else if (msg.includes("mat") || msg.includes("matematik")) {
                // Basit matematik sorusu algılama
                res = "Matematik konusunda yardımcı olmaya hazırım Efendim. Lütfen işlemi yazınız.";

                // Basit hesaplama denemesi
                try {
                    // Örn: "5 artı 3", "10 çarpı 4" vb. doğal dil → sayısal
                    let calcMsg = msg
                        .replace(/artı|plus/g, '+')
                        .replace(/eksi|minus/g, '-')
                        .replace(/çarpı|kere|times/g, '*')
                        .replace(/bölü|divided by/g, '/');
                    // Sayısal ifade var mı?
                    const match = calcMsg.match(/[\d\s\+\-\*\/\.]+/);
                    if (match) {
                        const result = Function('"use strict"; return (' + match[0].trim() + ')')();
                        if (!isNaN(result)) {
                            res = `Sonuç: ${result} Efendim.`;
                        }
                    }
                } catch(e) {}

            } else {
                res = "Sizi dinliyorum Efendim.";
            }

            speak(res);
        }

        // ========================
        // SESLİ + METİN ÇIKTI
        // ========================
        function speak(text) {
            // Metin panelini göster
            document.getElementById('transcript-area').style.display = 'block';
            document.getElementById('panel-switch').checked = true;
            document.getElementById('transcript-text').innerText = text;

            // Sesli okuma
            if (document.getElementById('voice-switch').checked) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'tr-TR';
                const gender = document.getElementById('voice-gender').value;
                u.pitch = (gender === 'erkek') ? 0.8 : 1.3;
                u.rate = 0.95;

                // iOS/Safari ses listesi asenkron yüklenir
                const setVoice = () => {
                    const voices = window.speechSynthesis.getVoices();
                    if (voices.length > 0) {
                        // Türkçe ses varsa kullan
                        const trVoice = voices.find(v => v.lang.includes('tr'));
                        if (trVoice) u.voice = trVoice;
                    }
                    window.speechSynthesis.speak(u);
                };

                if (window.speechSynthesis.getVoices().length > 0) {
                    setVoice();
                } else {
                    window.speechSynthesis.onvoiceschanged = setVoice;
                }
            }
        }

        // ========================
        // PANEL KONTROL
        // ========================
        function closeBox(id) { document.getElementById(id).style.display = 'none'; }

        function syncPanels() {
            const checked = document.getElementById('panel-switch').checked;
            document.getElementById('transcript-area').style.display = checked ? 'block' : 'none';
            document.getElementById('input-area').style.display = checked ? 'block' : 'none';
        }

        // ========================
        // DRAGGABLE (touch + mouse)
        // ========================
        function makeDraggable(el) {
            let prevX = 0, prevY = 0, startX = 0, startY = 0;
            const handle = el.querySelector('.panel-header') || el;

            function onStart(e) {
                e.stopPropagation();
                if (e.type === 'touchstart') {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                } else {
                    startX = e.clientX;
                    startY = e.clientY;
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('mouseup', onEnd);
                document.addEventListener('touchend', onEnd);
            }

            function onMove(e) {
                e.preventDefault();
                let cx, cy;
                if (e.type === 'touchmove') {
                    cx = e.touches[0].clientX;
                    cy = e.touches[0].clientY;
                } else {
                    cx = e.clientX;
                    cy = e.clientY;
                }
                prevX = startX - cx;
                prevY = startY - cy;
                startX = cx;
                startY = cy;
                el.style.top = (el.offsetTop - prevY) + "px";
                el.style.left = (el.offsetLeft - prevX) + "px";
            }

            function onEnd() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchend', onEnd);
            }

            handle.addEventListener('mousedown', onStart);
            handle.addEventListener('touchstart', onStart, { passive: false });
        }
    </script>
</body>
</html>
