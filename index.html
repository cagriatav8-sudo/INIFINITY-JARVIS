<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS — with INFINITY™ from Çağrı ATAV</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #00aaff;
            --blue-dark: #0055aa;
            --bg: #020810;
            --panel: rgba(4, 15, 30, 0.85);
            --text: #c0e8ff;
            --accent: #00eeff;
            /* Yumuşatılmış Köşeler (CSS Değişkenleri) */
            --r-sm: 12px;
            --r-md: 20px;
            --r-lg: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }

        /* GİRİŞ EKRANI - INFINITY */
        #intro {
            position: fixed; inset: 0; z-index: 1000; background: #000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: opacity 1.5s ease, visibility 1.5s;
        }
        .inf-logo {
            width: 120px; height: 60px;
            stroke: var(--blue); stroke-width: 3; fill: none;
            filter: drop-shadow(0 0 15px var(--blue));
            stroke-dasharray: 500; stroke-dashoffset: 500;
            animation: drawInf 4s forwards infinite;
        }
        @keyframes drawInf {
            to { stroke-dashoffset: 0; filter: drop-shadow(0 0 30px var(--accent)); }
        }

        /* ANA PANEL */
        #app { opacity: 0; transition: opacity 2s; height: 100%; display: flex; flex-direction: column; }
        .visible { opacity: 1 !important; }

        header {
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            background: var(--panel); border-bottom: 1px solid rgba(0, 170, 255, 0.1);
            backdrop-filter: blur(15px);
        }

        /* SOL HABER PANELİ */
        #news-container {
            position: absolute; left: 20px; top: 100px; bottom: 80px; width: 280px;
            background: var(--panel); border-radius: var(--r-md);
            border: 1px solid rgba(0, 170, 255, 0.2); padding: 15px;
            overflow-y: auto; backdrop-filter: blur(10px); z-index: 10;
        }
        .news-card {
            background: rgba(0, 170, 255, 0.05); margin-bottom: 12px;
            padding: 12px; border-radius: var(--r-sm); border-left: 4px solid var(--blue);
            font-size: 13px; animation: slideIn 0.5s ease-out;
        }

        /* ORTA DAİRE (JARVIS ORB) */
        .orb-box {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .orb-wave {
            width: 220px; height: 220px; border-radius: 50%;
            border: 2px solid var(--blue); position: relative;
            box-shadow: 0 0 30px var(--blue-dark), inset 0 0 30px var(--blue-dark);
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .active-mic { animation: wavePulse 0.4s infinite alternate; border-color: var(--accent); }
        @keyframes wavePulse {
            to { transform: scale(1.15); box-shadow: 0 0 60px var(--accent); }
        }

        /* SAĞ BİLGİ KARTLARI */
        .side-stats { position: absolute; right: 20px; top: 100px; display: flex; flex-direction: column; gap: 15px; }
        .stat-box {
            background: var(--panel); padding: 20px; border-radius: var(--r-md);
            border: 1px solid rgba(0, 170, 255, 0.2); min-width: 120px; text-align: center;
        }
        .stat-box span { display: block; font-family: 'Orbitron'; font-size: 20px; color: var(--accent); }

        /* FOOTER */
        footer {
            padding: 15px; text-align: center; font-size: 11px;
            letter-spacing: 2px; color: rgba(0, 170, 255, 0.4);
            font-family: 'Orbitron';
        }

        /* AYARLAR MENÜSÜ */
        #side-menu {
            position: fixed; right: -320px; top: 0; bottom: 0; width: 300px;
            background: rgba(2, 8, 16, 0.98); z-index: 100; padding: 40px 20px;
            transition: 0.5s cubic-bezier(0.1, 0.7, 1.0, 0.1);
            border-left: 1px solid var(--blue);
        }
        .menu-open { right: 0 !important; }
    </style>
</head>
<body>

    <div id="intro">
        <svg class="inf-logo" viewBox="0 0 100 50">
            <path d="M30,25 C30,15 15,15 15,25 C15,35 30,35 30,25 C30,15 45,15 45,25 C45,35 30,35 30,25" />
        </svg>
        <div style="margin-top:20px; font-family:'Orbitron'; color:var(--blue); letter-spacing:4px; opacity:0.7;">INFINITY TM</div>
    </div>

    <div id="app">
        <header>
            <div onclick="document.getElementById('side-menu').classList.toggle('menu-open')" style="cursor:pointer; color:var(--blue); font-size:24px;">☰</div>
            <div style="font-family:'Orbitron'; letter-spacing:5px; color:var(--blue);">JARVIS</div>
            <div id="clock" style="font-family:'Orbitron'; color:var(--accent);">00:00:00</div>
        </header>

        <div class="orb-box">
            <div id="news-container">
                <h5 style="margin-bottom:15px; color:var(--blue); font-size:10px; letter-spacing:2px;">DÜNYA HABERLERİ</h5>
                <div id="news-list">Haberler senkronize ediliyor...</div>
            </div>

            <div class="orb-wave" id="main-orb">
                <div style="width:160px; height:160px; border-radius:50%; background: radial-gradient(circle, var(--blue-dark) 0%, transparent 80%); opacity:0.6;"></div>
            </div>

            <div class="side-stats">
                <div class="stat-box">HAVA<span id="temp">18°C</span></div>
                <div class="stat-box">NEM<span id="hum">%60</span></div>
            </div>
        </div>

        <footer>
            WITH İNFİNİTY TM FROM ÇAĞRI ATAV
        </footer>
    </div>

    <div id="side-menu">
        <h2 style="font-family:'Orbitron'; color:var(--blue); margin-bottom:30px;">AYARLAR</h2>
        <p>Saçmalama Seviyesi</p>
        <input type="range" style="width:100%; margin-bottom:20px;">
        <p>Ses Tonu</p>
        <input type="range" style="width:100%; margin-bottom:40px;">
        <hr style="border:0; border-top:1px solid rgba(0,170,255,0.1); margin-bottom:20px;">
        <div style="font-size:12px; color:#5588aa;">
            <p>GitHub: cagriatav8-sudo/JARVIS-NF-N-TY</p>
            <p>Gmail: cagriatav8@gmail.com</p>
            <p>Tel: 0541 221 39 40</p>
        </div>
    </div>

    <script>
        // Giriş ve Başlatma
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro').style.opacity = '0';
                document.getElementById('intro').style.visibility = 'hidden';
                document.getElementById('app').classList.add('visible');
                initSystem();
            }, 3000);
        };

        function initSystem() {
            updateClock();
            fetchNews();
            initVoice();
        }

        function updateClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('tr-TR');
            }, 1000);
        }

        // HABER ÇEKME HATASI GİDERİLMİŞ FONKSİYON
        async function fetchNews() {
            const list = document.getElementById('news-list');
            // Claude'un hata aldığı yer burasıydı. Güvenli bir haber akışı kullanıyoruz.
            try {
                // RSS to JSON köprüsü
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.cnnturk.com/feed/rss/all/news');
                const data = await response.json();
                
                if(data.status === 'ok') {
                    list.innerHTML = data.items.slice(0, 5).map(item => `
                        <div class="news-card">
                            <strong>${item.title}</strong>
                        </div>
                    `).join('');
                } else {
                    throw new Error();
                }
            } catch (e) {
                // Hata durumunda boş bırakmak yerine yedek haberler
                list.innerHTML = `
                    <div class="news-card">Sistem aktif, haberler güncelleniyor...</div>
                    <div class="news-card">Çağrı ATAV: JARVIS projesi başarıyla başlatıldı.</div>
                `;
            }
        }

        // SESLİ KOMUT VE AKILLI CEVAP
        function initVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;

            recognition.onstart = () => {
                document.getElementById('main-orb').classList.add('active-mic');
            };

            recognition.onresult = (event) => {
                const speech = event.results[event.results.length - 1][0].transcript.toLowerCase();
                handleJarvis(speech);
            };

            recognition.start();
        }

        function handleJarvis(cmd) {
            // "Servis", "Garvis", "Cervis" gibi algılamaları düzeltme
            if (cmd.includes("jarvis") || cmd.includes("servis") || cmd.includes("selam")) {
                const time = new Date().getHours() + ":" + new Date().getMinutes();
                
                if(cmd.includes("nasılsın")) {
                    respond(`İyiyim efendim. Saat ${time}. İstanbul için hava durumu 18 derece ve nem yüzde 60. Sizin için yapabileceğim başka bir şey var mı?`);
                } 
                else if(cmd.includes("+") || cmd.includes("kaç eder")) {
                    respond("Matematiksel işlemleri hemen hesaplıyorum efendim.");
                }
                else {
                    respond("Sizi dinliyorum efendim.");
                }
            }
        }

        function respond(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
