<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - by Çağrı Atav</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f; /* Dark Mode severiz */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Navigasyon ve Menü */
        .navbar { position: fixed; top: 20px; left: 20px; z-index: 1001; }
        
        .brand-link {
            cursor: pointer;
            font-weight: bold;
            color: #a855f7; /* Codeium Moru :) */
            padding: 10px 20px;
            border: 2px solid #a855f7;
            border-radius: 30px;
            background: rgba(168, 85, 247, 0.1);
            transition: 0.3s;
        }

        .side-menu {
            position: fixed;
            top: 80px;
            left: -260px;
            width: 220px;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 0 20px 20px 0;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .side-menu.active { left: 0; }

        /* Kart Yapısı */
        .card {
            width: 320px;
            padding: 25px;
            background: #1e1e1e;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            cursor: pointer;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        /* Haber Ekranı */
        #haberEkrani {
            margin-top: 20px;
            padding: 15px;
            border-left: 4px solid #a855f7;
            background: #252525;
            width: 80%;
            max-width: 500px;
            min-height: 50px;
            display: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div id="menuToggle" class="brand-link">by Çağrı Atav</div>
        <div id="sideMenu" class="side-menu">
            <h4 style="margin-top:0">Ses Ayarları</h4>
            <label><input type="radio" name="voice" value="kadin" checked> Kız Sesi</label><br><br>
            <label><input type="radio" name="voice" value="erkek"> Erkek Sesi</label>
        </div>
    </nav>

    <div id="parentCard" class="card">
        <h3>Sistem Kontrolü</h3>
        <p>Haberleri duymak için "Haberler" de veya butona tıkla.</p>
        <button id="childButton" class="delete-btn">Kartı Sil (Bubbling)</button>
    </div>

    <div id="haberEkrani"></div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const card = document.getElementById('parentCard');
        const button = document.getElementById('childButton');
        const haberEkrani = document.getElementById('haberEkrani');

        // --- 1. MENÜ VE SES AYARI ---
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            sideMenu.classList.toggle('active');
        });

        // --- 2. iPHONE UYUMLU SES TANIMA (SPEECH RECOGNITION) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;

            recognition.onresult = (event) => {
                const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
                console.log("Algılanan Ses:", command);
                
                if (command.includes("haberler") || command.includes("selam")) {
                    haberOkuVeYaz("Efendim, bugün teknoloji dünyasında Infinity projeleri hızla gelişmeye devam ediyor. Çağrı Atav yeni özellikler ekledi.");
                }
            };
            
            // iPhone için tıklama ile başlatma şartı
            document.body.addEventListener('click', () => {
                recognition.start();
                console.log("Sistem Dinlemede...");
            }, { once: true });
        }

        // --- 3. HEM YAZMA HEM KONUŞMA (SYNTHESIS) ---
        function haberOkuVeYaz(metin) {
            // Ekrana Yaz
            haberEkrani.style.display = 'block';
            haberEkrani.innerText = metin;

            // Sesli Oku
            const utterance = new SpeechSynthesisUtterance(metin);
            const seciliSes = document.querySelector('input[name="voice"]:checked').value;
            
            utterance.lang = 'tr-TR';
            utterance.pitch = seciliSes === 'kadin' ? 1.3 : 0.7; // Kız sesi ince, erkek sesi kalın
            utterance.rate = 1;

            window.speechSynthesis.speak(utterance);
        }

        // --- 4. BUBBLING VE KART SİLME ---
        button.addEventListener('click', (e) => {
            console.log("LOG: Butona tıklandı (Child).");
            // Buraya tıklayınca haber okuma tetikleyebilirsin:
            haberOkuVeYaz("Kart sistemi kendini imha ediyor. Bubbling tetiklendi.");
        });

        card.addEventListener('click', () => {
            console.log("LOG: Kart (Parent) olayı yakaladı ve siliniyor.");
            setTimeout(() => { card.remove(); }, 500);
        });

        // Dışarı tıklayınca menüyü kapat
        document.addEventListener('click', () => sideMenu.classList.remove('active'));
    </script>
</body>
</html>
