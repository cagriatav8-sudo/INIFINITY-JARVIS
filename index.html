<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JARVIS — with INFINITY™ from Çağrı ATAV</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#00aaff;--blue-dark:#0055aa;--bg:#020810;
    --panel:#040f1ecc;--text:#c0e8ff;--accent:#00eeff;
    --r-sm:10px;--r-md:16px;--r-lg:22px;--r-xl:28px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;width:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;}

  /* INTRO */
  #intro{position:fixed;inset:0;z-index:999;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 1.5s ease;}
  #intro.fade-out{opacity:0;pointer-events:none;}
  .inf-svg{width:140px;height:70px;animation:pulse-inf 2s ease-in-out infinite;}
  @keyframes pulse-inf{0%,100%{filter:drop-shadow(0 0 8px var(--blue)) drop-shadow(0 0 24px var(--blue-dark));}50%{filter:drop-shadow(0 0 28px var(--accent)) drop-shadow(0 0 60px var(--blue));}}
  .intro-brand{margin-top:18px;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;color:var(--blue);opacity:0;animation:fadeIn 1s 1.3s forwards;text-align:center;}
  @keyframes fadeIn{to{opacity:1;}}

  /* APP */
  #app{position:fixed;inset:0;opacity:0;transition:opacity 1.5s ease 0.3s;pointer-events:none;display:flex;flex-direction:column;}
  #app.visible{opacity:1;pointer-events:all;}
  #app::before{content:'';position:fixed;inset:0;z-index:0;background:linear-gradient(rgba(0,170,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,170,255,.04) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 8s linear infinite;pointer-events:none;}
  @keyframes gridMove{to{background-position:0 40px;}}

  /* TOP BAR */
  #top-bar{position:relative;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px;background:var(--panel);border-bottom:1px solid #00aaff18;backdrop-filter:blur(14px);flex-shrink:0;}
  #menu-btn{width:38px;height:38px;background:#00aaff0a;border:1px solid #00aaff33;border-radius:var(--r-sm);cursor:pointer;display:flex;flex-direction:column;gap:5px;justify-content:center;align-items:center;transition:border-color .3s;flex-shrink:0;}
  #menu-btn:active{border-color:var(--blue);}
  #menu-btn span{width:18px;height:2px;background:var(--blue);border-radius:4px;display:block;}
  #top-title{font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:3px;color:var(--blue);}
  #status-bar{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .stat{display:flex;flex-direction:column;align-items:center;background:#00aaff0a;border:1px solid #00aaff22;border-radius:var(--r-sm);padding:4px 8px;}
  .stat .val{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--accent);line-height:1;}
  .stat .lbl{font-size:7px;letter-spacing:1px;color:#5599bb;text-transform:uppercase;margin-top:2px;}

  /* CONTENT */
  #content{flex:1;overflow:hidden;display:flex;position:relative;z-index:10;min-height:0;}

  /* NEWS PANEL */
  #news-panel{width:0;overflow:hidden;background:var(--panel);border-right:1px solid #00aaff18;border-radius:0 var(--r-xl) var(--r-xl) 0;display:flex;flex-direction:column;gap:8px;padding:0;transition:width .4s ease,padding .4s ease;backdrop-filter:blur(14px);flex-shrink:0;}
  #news-panel.show{width:min(280px,85vw);padding:16px 12px;overflow-y:auto;}
  #news-panel::-webkit-scrollbar{width:3px;}
  #news-panel::-webkit-scrollbar-thumb{background:#00aaff33;border-radius:10px;}
  #news-panel h2{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:var(--blue);border-bottom:1px solid #00aaff22;padding-bottom:6px;margin-bottom:4px;white-space:nowrap;}
  .news-item{background:#00aaff08;border:1px solid #00aaff1a;border-radius:var(--r-md);padding:9px 11px;font-size:12px;line-height:1.4;color:#aaddff;flex-shrink:0;}
  .news-item .nt{font-size:9px;color:#447799;margin-bottom:3px;}

  /* MAIN */
  #main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:16px 12px 12px;overflow-y:auto;min-width:0;}
  #main::-webkit-scrollbar{display:none;}

  /* ORB */
  #orb-wrap{position:relative;width:160px;height:160px;flex-shrink:0;}
  #orb-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--blue);box-shadow:0 0 16px var(--blue-dark),inset 0 0 16px var(--blue-dark);}
  #orb-ring.active{animation:rpulse .6s ease-in-out infinite alternate;}
  @keyframes rpulse{from{box-shadow:0 0 10px var(--blue),inset 0 0 10px var(--blue-dark);}to{box-shadow:0 0 40px var(--accent),0 0 80px var(--blue),inset 0 0 30px var(--blue);}}
  #orb-canvas{width:160px;height:160px;border-radius:50%;display:block;}
  #orb-label{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:var(--blue);white-space:nowrap;}

  /* TEXT */
  #transcript{max-width:100%;width:100%;text-align:center;font-size:15px;line-height:1.5;color:var(--accent);font-weight:600;letter-spacing:1px;text-shadow:0 0 10px var(--blue);background:#00aaff06;border:1px solid #00aaff18;border-radius:var(--r-lg);padding:10px 16px;min-height:42px;}
  #response-box{max-width:100%;width:100%;background:var(--panel);border:1px solid #00aaff2a;border-radius:var(--r-lg);padding:14px 18px;font-size:14px;line-height:1.7;color:#aaddff;backdrop-filter:blur(8px);display:none;overflow-y:auto;max-height:180px;}
  #response-box::-webkit-scrollbar{width:3px;}
  #response-box::-webkit-scrollbar-thumb{background:#00aaff33;border-radius:10px;}

  /* LOADING */
  .dots{display:inline-flex;gap:4px;align-items:center;}
  .dots span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:dot 1.2s ease-in-out infinite;}
  .dots span:nth-child(2){animation-delay:.2s;}
  .dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}

  /* MIC */
  #mic-btn{width:58px;height:58px;border-radius:50%;background:transparent;border:2px solid var(--blue);color:var(--blue);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;box-shadow:0 0 12px var(--blue-dark);flex-shrink:0;touch-action:manipulation;}
  #mic-btn.listening{background:#00aaff22;box-shadow:0 0 30px var(--blue),0 0 60px var(--blue-dark);border-color:var(--accent);color:var(--accent);}

  /* SETTINGS */
  #settings-overlay{position:fixed;inset:0;z-index:299;background:#00000066;opacity:0;pointer-events:none;transition:opacity .3s;}
  #settings-overlay.show{opacity:1;pointer-events:all;}
  #settings{position:fixed;top:0;left:-330px;width:min(300px,90vw);height:100vh;background:#020d1fee;border-right:1px solid #00aaff22;border-radius:0 var(--r-xl) var(--r-xl) 0;backdrop-filter:blur(24px);z-index:300;padding:70px 20px 28px;transition:left .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;gap:20px;overflow-y:auto;}
  #settings.open{left:0;}
  #settings h2{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--blue);}
  .sg{background:#00aaff08;border:1px solid #00aaff18;border-radius:var(--r-md);padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
  .sg label{font-size:11px;letter-spacing:2px;color:#5599bb;text-transform:uppercase;}
  .sg input[type=range]{width:100%;accent-color:var(--blue);}
  .vd{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--accent);text-align:right;}

  /* FOOTER */
  #info-footer{position:relative;z-index:10;flex-shrink:0;background:#040f1eaa;border-top:1px solid #00aaff12;padding:7px 16px;text-align:center;font-size:10px;color:#334455;line-height:1.8;letter-spacing:1px;}
  #info-footer a{color:#00aaff66;text-decoration:none;}
  #info-footer a:hover{color:var(--accent);}
  #info-footer .brand{font-family:'Orbitron',sans-serif;font-size:8px;color:#00aaff33;margin-top:1px;letter-spacing:2px;}

  @media(min-width:600px){
    #orb-wrap{width:200px;height:200px;}
    #orb-canvas{width:200px;height:200px;}
    #transcript{font-size:17px;}
    #response-box{font-size:15px;max-height:200px;}
    #main{gap:26px;padding:20px;}
    .stat .val{font-size:16px;}
  }
</style>
</head>
<body>

<div id="intro">
  <svg class="inf-svg" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M100,50 C100,25 130,10 155,10 C182,10 200,28 200,50 C200,72 182,90 155,90 C130,90 100,75 100,50 C100,25 70,10 45,10 C18,10 0,28 0,50 C0,72 18,90 45,90 C70,90 100,75 100,50 Z"
      fill="none" stroke="#00aaff" stroke-width="4" stroke-dasharray="600" stroke-dashoffset="600">
      <animate attributeName="stroke-dashoffset" from="600" to="0" dur="2s" fill="freeze"/>
      <animate attributeName="stroke" values="#00aaff;#00eeff;#00aaff" dur="3s" begin="2s" repeatCount="indefinite"/>
    </path>
  </svg>
  <div class="intro-brand">∞ INFINITY™ — JARVIS</div>
</div>

<div id="settings-overlay" onclick="closeSettings()"></div>
<div id="settings">
  <h2>⚙ AYARLAR</h2>
  <div class="sg">
    <label>Saçmalama Seviyesi</label>
    <input type="range" id="chaos-slider" min="0" max="10" value="3" oninput="updateChaos(this.value)">
    <div class="vd" id="chaos-val">3 / 10</div>
  </div>
  <div class="sg">
    <label>Ses Tonu (Pitch)</label>
    <input type="range" id="pitch-slider" min="0.5" max="2" step="0.05" value="1" oninput="updatePitch(this.value)">
    <div class="vd" id="pitch-val">1.00</div>
  </div>
  <div class="sg">
    <label>Konuşma Hızı</label>
    <input type="range" id="rate-slider" min="0.5" max="2" step="0.05" value="1" oninput="updateRate(this.value)">
    <div class="vd" id="rate-val">1.00</div>
  </div>
</div>

<div id="app">
  <div id="top-bar">
    <button id="menu-btn" onclick="toggleSettings()"><span></span><span></span><span></span></button>
    <div id="top-title">J·A·R·V·I·S</div>
    <div id="status-bar">
      <div class="stat"><span class="val" id="temp-val">--</span><span class="lbl">°C</span></div>
      <div class="stat"><span class="val" id="hum-val">--</span><span class="lbl">Nem</span></div>
      <div class="stat"><span class="val" id="clock">--:--</span><span class="lbl">Saat</span></div>
    </div>
  </div>

  <div id="content">
    <div id="news-panel">
      <h2>📡 CANLI HABERLER</h2>
      <div id="news-list"><div class="news-item"><div class="nt">Yükleniyor…</div></div></div>
    </div>
    <div id="main">
      <div id="orb-wrap">
        <div id="orb-ring"></div>
        <canvas id="orb-canvas" width="200" height="200"></canvas>
        <div id="orb-label">JARVIS CORE</div>
      </div>
      <div id="transcript">Merhaba efendim. Hazırım.</div>
      <div id="response-box"></div>
      <button id="mic-btn" onclick="toggleMic()">🎙</button>
    </div>
  </div>

  <div id="info-footer">
    <a href="https://github.com/cagriatav8-sudo/JARVIS-NF-N-TY" target="_blank">GitHub</a> &nbsp;|&nbsp;
    <a href="mailto:cagriatav8@gmail.com">cagriatav8@gmail.com</a> &nbsp;|&nbsp;
    <a href="tel:+905412213940">0541 221 39 40</a>
    <div class="brand">with INFINITY™ from Çağrı ATAV</div>
  </div>
</div>

<script>
// ── SETTINGS ──
let chaosLevel=3, pitchVal=1, rateVal=1, settingsOpen=false, newsOpen=false;
function toggleSettings(){
  settingsOpen=!settingsOpen;
  document.getElementById('settings').classList.toggle('open',settingsOpen);
  document.getElementById('settings-overlay').classList.toggle('show',settingsOpen);
}
function closeSettings(){ settingsOpen=false; document.getElementById('settings').classList.remove('open'); document.getElementById('settings-overlay').classList.remove('show'); }
function updateChaos(v){ chaosLevel=+v; document.getElementById('chaos-val').textContent=v+' / 10'; }
function updatePitch(v){ pitchVal=+v; document.getElementById('pitch-val').textContent=(+v).toFixed(2); }
function updateRate(v){ rateVal=+v; document.getElementById('rate-val').textContent=(+v).toFixed(2); }

// ── INTRO ──
setTimeout(()=>{ document.getElementById('intro').classList.add('fade-out'); document.getElementById('app').classList.add('visible'); fetchNews(); },3200);

// ── CLOCK ──
function tick(){ document.getElementById('clock').textContent=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}); }
tick(); setInterval(tick,1000);

// ── WEATHER ──
window._wd=null; window._city='konumunuz';
async function fetchWeather(){
  try{
    const geo=await fetch('https://ipapi.co/json/');
    const loc=await geo.json();
    const lat=loc.latitude||41.01, lon=loc.longitude||28.97;
    window._city=loc.city||'İstanbul';
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weathercode&timezone=auto`);
    const d=await res.json(); const c=d.current;
    const temp=Math.round(c.temperature_2m), hum=c.relative_humidity_2m, code=c.weathercode;
    document.getElementById('temp-val').textContent=temp+'°';
    document.getElementById('hum-val').textContent=hum+'%';
    window._wd={temp,hum,code};
  }catch(e){ document.getElementById('temp-val').textContent='??'; }
}
fetchWeather(); setInterval(fetchWeather,600000);

function wLabel(c){ if(c===0)return'açık ve güneşli'; if(c<=3)return'parçalı bulutlu'; if(c<=67)return'yağmurlu'; if(c<=77)return'karlı'; if(c<=82)return'sağanak yağışlı'; return'fırtınalı'; }
function wIcon(c){ if(c===0)return'☀'; if(c<=3)return'⛅'; if(c<=67)return'🌧'; if(c<=77)return'❄'; if(c<=82)return'🌦'; return'⛈'; }

// ── NEWS ──
async function fetchNews(){
  const box=document.getElementById('news-list');
  try{
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://www.ntv.com.tr/son-dakika.rss'));
    const j=await r.json();
    const doc=new DOMParser().parseFromString(j.contents,'text/xml');
    const items=[...doc.querySelectorAll('item')].slice(0,10);
    if(!items.length) throw new Error('no items');
    box.innerHTML=items.map(it=>{
      const title=it.querySelector('title')?.textContent?.trim()||'';
      const pub=it.querySelector('pubDate')?.textContent?.trim()||'';
      const t=pub?new Date(pub).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}):'';
      return`<div class="news-item"><div class="nt">${t}</div>${title}</div>`;
    }).join('');
  }catch(e){ box.innerHTML='<div class="news-item"><div class="nt">Haberler yüklenemedi</div>İnternet bağlantısını kontrol edin.</div>'; }
}
setInterval(fetchNews,300000);

// ── ORB ──
const canvas=document.getElementById('orb-canvas');
const ctx=canvas.getContext('2d');
let orbActive=false, animD=new Array(64).fill(0);
const orbSize=canvas.width;
function drawOrb(){
  ctx.clearRect(0,0,orbSize,orbSize);
  const cx=orbSize/2, cy=orbSize/2, r=orbSize*0.4;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle='#020810'; ctx.fill();
  animD=animD.map((v,i)=>{ const t=orbActive?(Math.random()*60+10)*(i%3===0?1.5:1):8; return v+(t-v)*0.3; });
  for(let i=0;i<40;i++){
    const a=(i/40)*Math.PI*2-Math.PI/2;
    const h=animD[i%64]*0.4+4;
    const x1=cx+Math.cos(a)*(r-8), y1=cy+Math.sin(a)*(r-8);
    const x2=cx+Math.cos(a)*(r-8+h), y2=cy+Math.sin(a)*(r-8+h);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle=orbActive?`hsl(${190+i*2},100%,70%)`:'rgba(0,150,220,0.5)';
    ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();
  }
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,6);
  g.addColorStop(0,'#00eeff'); g.addColorStop(1,'#0055aa00');
  ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  requestAnimationFrame(drawOrb);
}
drawOrb();

// ── SPEECH ──
let recog=null, isListen=false;
function toggleMic(){ isListen?stopListen():startListen(); }
function startListen(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showResp('Tarayıcınız mikrofonu desteklemiyor efendim.'); return; }
  recog=new SR(); recog.lang='tr-TR'; recog.interimResults=true; recog.continuous=false;
  recog.onstart=()=>{ isListen=true; orbActive=true; document.getElementById('mic-btn').classList.add('listening'); document.getElementById('orb-ring').classList.add('active'); document.getElementById('transcript').textContent='Dinliyorum…'; };
  recog.onresult=e=>{ const t=[...e.results].map(r=>r[0].transcript).join(''); document.getElementById('transcript').textContent=t; if(e.results[e.results.length-1].isFinal){ stopListen(); handleCmd(t.trim()); } };
  recog.onerror=()=>stopListen(); recog.onend=()=>stopListen();
  recog.start();
}
function stopListen(){ isListen=false; orbActive=false; if(recog){try{recog.stop();}catch(e){}} document.getElementById('mic-btn').classList.remove('listening'); document.getElementById('orb-ring').classList.remove('active'); }

// ── COMMAND HANDLER ──
async function handleCmd(raw){
  const cmd = raw.toLowerCase();

  const now=new Date();
  const ts=now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  const w=window._wd; const city=window._city;

  // ── Selamlama / Nasılsın ──
  // "jarvis", "selam jarvis", "naber jarvis", "nasılsın jarvis" gibi kalıplar
  // Türkçe konuşma tanıma "JARVIS" yerine "jarvis", "cervis", "jarvis", "servis", "garvis" diyebilir
  // Bunları akıllıca yakalıyoruz
  const selamKaliplari = ['selam','merhaba','naber','ne haber','nasılsın','nasıl','hey','hi','hello'];
  const jarvisVariantlari = ['jarvis','cervis','garvis','servis','jarwis','ciarvis','jarviş','jarviis','jarviş'];

  const icerikJarvis = jarvisVariantlari.some(v => cmd.includes(v));
  const icerikSelam = selamKaliplari.some(v => cmd.includes(v));

  // sadece "jarvis" veya "selam jarvis" veya "naber jarvis" dediyse → selamlama cevabı ver
  if(icerikJarvis && (icerikSelam || cmd.split(' ').length <= 2)){
    let r=`İyiyim efendim. Saat ${ts}.`;
    if(w) r+=` ${city} için hava ${wLabel(w.code)}, ${w.temp}°C, nem yüzde ${w.hum}.`;
    speak(r); showResp(r); return;
  }

  // ── Saat ──
  if(/\bsaat\b/.test(cmd) && cmd.split(' ').length<=3){
    const r=`Saat ${ts} efendim.`; speak(r); showResp(r); return;
  }

  // ── Hava durumu ──
  if(/(hava|sıcaklık|nem|derece|hava durumu)/.test(cmd) && !/neden|nasıl|niçin|mi yaptı|ne zaman/.test(cmd)){
    if(w){ const r=`${city} için hava şu an ${wLabel(w.code)}, ${w.temp}°C, nem yüzde ${w.hum}.`; speak(r); showResp(r); }
    else { speak('Hava verisi henüz yüklenmedi efendim.'); showResp('Hava verisi henüz yüklenmedi efendim.'); }
    return;
  }

  // ── Diğer her şey → Claude API'ye sor ──
  showLoading();
  orbActive=true; document.getElementById('orb-ring').classList.add('active');
  try{
    const weatherCtx = w ? `Şu anki hava durumu: ${city}, ${wLabel(w.code)}, ${w.temp}°C, nem %${w.hum}.` : '';
    const systemPrompt = `Sen JARVIS'sin — kullanıcının kişisel yapay zeka asistanı. Kısa, net ve kibarca Türkçe cevap ver. "efendim" diye hitap et. Cevaplar maksimum 2-3 cümle olsun. Matematik sorularında direkt sonucu söyle. Tarih sorularında kısaca ve doğru cevap ver. Güncel tarihi bilgileri biliyorsun. ${weatherCtx} Şu anki saat: ${ts}.`;
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:200,
        system: systemPrompt,
        messages:[{role:'user',content:raw}]
      })
    });
    const data=await resp.json();
    const answer=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    if(answer){ speak(answer); showResp(answer); }
    else{ const fb='Anlayamadım efendim, tekrar söyler misiniz?'; speak(fb); showResp(fb); }
  }catch(err){
    // API yoksa basit fallback
    const fb=fallback(cmd,ts,w,city);
    speak(fb); showResp(fb);
  }
  orbActive=false; document.getElementById('orb-ring').classList.remove('active');
}

// ── FALLBACK (API olmadan) ──
function fallback(cmd, ts, w, city){
  // Matematik
  const mathMatch=cmd.match(/(\d+[\s]*[\+\-\*\/xX÷][\s]*\d+)/);
  if(mathMatch){
    try{
      const expr=mathMatch[1].replace(/x|X/g,'*').replace(/÷/g,'/').replace(/\s/g,'');
      const res=Function('"use strict";return('+expr+')')();
      return`${mathMatch[1].trim()} işleminin sonucu ${res} efendim.`;
    }catch(e){}
  }
  // Tarih
  if(/atatürk|cumhuriyet|osmanlı|selçuklu|savaş|devrim|tarih/.test(cmd)){
    return'Bu konuyu daha iyi yanıtlamak için internet bağlantısına ihtiyacım var efendim. Lütfen Claude API bağlantısını kontrol edin.';
  }
  return`"${cmd}" sorunuzu yanıtlamak için bağlantı gerekiyor efendim. API bağlantısını kontrol edin.`;
}

// ── SPEAK ──
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='tr-TR'; u.pitch=pitchVal; u.rate=rateVal; u.volume=1;
  u.onstart=()=>{ orbActive=true; document.getElementById('orb-ring').classList.add('active'); };
  u.onend=()=>{ orbActive=false; document.getElementById('orb-ring').classList.remove('active'); };
  window.speechSynthesis.speak(u);
}

function showLoading(){
  const b=document.getElementById('response-box');
  b.innerHTML='<span class="dots"><span></span><span></span><span></span></span>';
  b.style.display='block';
}
function showResp(t){
  const b=document.getElementById('response-box');
  b.textContent=t; b.style.display='block';
}
