<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çağrı ATAV | Yazılımcı</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: #fff;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: auto repeat(2, 1fr);
            gap: 30px;
            padding: 50px;
            height: 100vh;
            box-sizing: border-box;
            opacity: 0;
            animation: fadeInContent 1s ease forwards;
            animation-delay: 2.5s;
        }

        .box {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #ff0055;
            border-radius: 40px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 0, 85, 0.3);
        }

        .box h2 {
            margin: 0 0 10px 0;
            color: #ff0055;
            font-size: 1.2em;
            text-transform: uppercase;
        }

        .box p { margin: 5px 0; color: #ccc; font-weight: 500; }
        .box a { color: #ff0055; text-decoration: none; font-weight: bold; }

        #name-box {
            grid-column: 1 / span 2;
            flex-direction: row;
            justify-content: space-between;
            padding: 20px 60px;
            background: rgba(20, 20, 20, 0.95);
        }

        #name-box .info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        #name-box h1 {
            font-size: 1.8em;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #name-box span {
            color: #ff0055;
            font-size: 0.9em;
            font-weight: bold;
        }

        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .infinity-loader {
            position: relative;
            width: 80px;
            height: 40px;
            display: flex;
            justify-content: center;
        }

        .infinity-loader .curve {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 5px solid transparent;
            border-top-color: #ff0055;
            border-left-color: #ff0055;
            animation: rotateInfinity 1.5s linear infinite;
        }

        .left-curve { left: 0; }
        .right-curve {
            right: 0;
            animation-delay: -0.75s;
            border-top-color: #ff0055;
            border-right-color: #ff0055;
            border-left-color: transparent;
        }

        @keyframes rotateInfinity {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loader-wrapper.moving {
            width: 60px;
            height: 30px;
            top: 45px;
            left: calc(100% - 120px);
            background: transparent;
        }

        #loader-wrapper.moving .infinity-loader {
            transform: scale(0.6);
        }

        @keyframes fadeInContent {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="loader-wrapper">
        <div class="infinity-loader">
            <div class="curve left-curve"></div>
            <div class="curve right-curve"></div>
        </div>
    </div>

    <div class="grid-container">
        
        <div class="box" id="name-box">
            <div class="info">
                <h1>ÇAĞRI ATAV</h1>
                <span>YAZILIMCI</span>
            </div>
            <div id="logo-target" style="width: 60px; height: 30px;"></div>
        </div>

        <div class="box">
            <h2>E-Posta</h2>
            <p><a href="mailto:cagriatav8@gmail.com">cagriatav8@gmail.com</a></p>
        </div>

        <div class="box">
            <h2>Telefon</h2>
            <p><a href="tel:05412213940">0541 221 39 40</a></p>
        </div>

        <div class="box">
            <h2>Yetenekler</h2>
            <p>JavaScript, Node.js, Arduino</p>
        </div>

        <div class="box">
            <h2>İletişim</h2>
            <p><a href="https://wa.me/905412213940" target="_blank">WhatsApp'tan Yaz</a></p>
        </div>

    </div>

    <script>
        // Sesli Karşılama Fonksiyonu
        function sesliKarsilama() {
            if (window.speechSynthesis.speaking) return; 
            
            const mesaj = new SpeechSynthesisUtterance();
            mesaj.text = "Selam! Ben Çağrı Atav. Yazılımcı ve teknoloji meraklısıyım. JavaScript, Node.js ve Arduino ile projeler geliştiriyorum. Portfolyoma hoş geldin!";
            mesaj.lang = 'tr-TR';
            mesaj.rate = 1; 
            mesaj.pitch = 1;
            
            window.speechSynthesis.speak(mesaj);
        }

        window.addEventListener('load', function() {
            const loader = document.getElementById('loader-wrapper');
            const target = document.getElementById('logo-target');

            setTimeout(() => {
                loader.classList.add('moving');
                setTimeout(() => {
                    target.appendChild(loader.querySelector('.infinity-loader'));
                    loader.style.display = 'none';
                    // Otomatik başlatma denemesi
                    sesliKarsilama();
                }, 800);
            }, 1500);
        });

        // Tarayıcı engeline karşı herhangi bir tıklamada sesi başlat
        document.body.addEventListener('click', function() {
            sesliKarsilama();
        }, { once: true });

        // Arka plan animasyonu (Starfield)
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let width, height, stars;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    z: Math.random() * width,
                    o: Math.random()
                });
            }
        }

        function draw() {
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, width, height);

            for (let star of stars) {
                let px = (star.x - width / 2) * (width / star.z) + width / 2;
                let py = (star.y - height / 2) * (width / star.z) + height / 2;
                let r = (1 - star.z / width) * 2;

                ctx.fillStyle = `rgba(255, 0, 85, ${star.o})`;
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.fill();

                star.z -= 0.5;
                if (star.z <= 0) star.z = width;
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
